<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0b0d10" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>堆積する世界 v0</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overscroll-behavior: none; }
    /* iOS スタンドアロンPWA：本体をビューポートに固定してスクロールでの“ずれ”を防ぐ */
    body {
      position: fixed; inset: 0; height: 100dvh; overflow: hidden;
      background: #0b0d10; color: #cfd6dd;
      font-family: "Hiragino Sans", system-ui, sans-serif;
      display: flex; flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      touch-action: manipulation;
    }

    /* ---- ステータスバー ---- */
    #status {
      flex: none; display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; font-size: 12.5px; color: #aab4c0;
      border-bottom: 1px solid #1c222b; background: #10141a;
    }
    #stName { color: #e8e2d4; }
    #stHp { color: #e06c5a; }
    #stExp { color: #9d8fd8; }
    #status .spacer { flex: 1; }
    #spellBtn, #mapBtn, #menuBtn {
      font-size: 16px; color: #8b94a0; background: none;
      border: 1px solid #2a313b; border-radius: 8px; padding: 3px 12px;
    }
    #spellBtn { color: #b79be0; border-color: #3a2f50; }

    /* ---- マップ（方向A：発光グリフ） ---- */
    #mapWrap { position: relative; flex: 1; overflow: hidden; background: #07090c; touch-action: none; }
    #grid { display: grid; width: 100%; }
    .cell {
      position: relative; display: flex; align-items: center; justify-content: center;
      background: #07090c; overflow: hidden;
      font-family: "Menlo", "Consolas", monospace; font-weight: 700;
    }
    .cell.wall { background: #11151c; }
    .cell span { display: block; }
    /* グリフ色（発光） */
    .g-wall   { color: #39434f; }
    .g-floor  { color: #2c333d; }
    .g-down, .g-up { color: #6fb3c8; text-shadow: 0 0 9px rgba(111,179,200,.6); }
    .g-player { color: #ffd87a; text-shadow: 0 0 12px rgba(255,216,122,.9), 0 0 26px rgba(255,160,60,.45); }
    .g-player-danger { color: #ff4f3c; text-shadow: 0 0 14px rgba(255,79,60,1), 0 0 30px rgba(255,50,30,.7); animation: danger .55s ease-in-out infinite; }
    @keyframes danger { 50% { color: #fff1e0; text-shadow: 0 0 18px rgba(255,120,90,1), 0 0 36px rgba(255,60,40,.85); } }
    /* 移動予告：敵が踏み込む先のマスを背景でハイライト（琥珀。攻撃予告の赤へ自然に段階づく） */
    .cell.tele-move { background: rgba(224,140,72,.34); box-shadow: 0 0 7px rgba(224,140,72,.3) inset; }
    /* 敵：記号＝種類／色＝強さの段（tier）。一目で危険度が分かる（4-11F）。 */
    .g-mon-t1 { color: #c4ccd4; text-shadow: 0 0 6px rgba(196,204,212,.5); }   /* 灰白：雑魚 */
    .g-mon-t2 { color: #e0c46a; text-shadow: 0 0 7px rgba(224,196,106,.55); }  /* 黄 */
    .g-mon-t3 { color: #e58a45; text-shadow: 0 0 9px rgba(229,138,69,.65); }   /* 橙 */
    .g-mon-t4 { color: #e0564a; text-shadow: 0 0 10px rgba(224,86,74,.75); }   /* 赤 */
    .g-mon-t5 { color: #c071ff; text-shadow: 0 0 13px rgba(192,113,255,.9); animation: pulse 2s ease-in-out infinite; } /* 紫発光：最危険 */
    /* ボス：中ボス＝金の輝き／エリアボス＝紫紅の脈動（別格） */
    .g-elite { color: #ffcf4a; text-shadow: 0 0 10px #ffcf4a, 0 0 20px rgba(255,170,40,.6); animation: pulse 1.4s ease-in-out infinite; }
    .g-boss  { color: #ff5cf0; text-shadow: 0 0 14px #ff5cf0, 0 0 30px rgba(255,60,200,.6); animation: pulse 1.05s ease-in-out infinite; }
    /* 攻撃を予告中：色はtierのまま、強く明滅して「来る」と知らせる */
    .g-mon-atk { animation: monatk .5s ease-in-out infinite; }
    @keyframes monatk { 0%,100% { text-shadow: 0 0 6px currentColor; } 50% { text-shadow: 0 0 16px currentColor, 0 0 26px currentColor; filter: brightness(1.5); } }
    .g-fossil { color: #9fd8cf; text-shadow: 0 0 10px rgba(159,216,207,.75); animation: pulse 2.6s ease-in-out infinite; }
    .g-fossil-quiet { color: #6f9a93; }
    .g-chest { color: #e8c06a; text-shadow: 0 0 9px rgba(232,192,106,.7); }
    .g-chest-open { color: #7a6a44; }
    @keyframes pulse { 50% { text-shadow: 0 0 16px rgba(159,216,207,1), 0 0 30px rgba(159,216,207,.4); } }
    /* 攻撃予告：自分のマスが討たれる＝赤い危険枠（@ も赤く明滅する：g-player-danger） */
    .cell.tele-atk::after {
      content: ""; position: absolute; inset: 0; border-radius: 3px; pointer-events: none;
      border: 2.5px solid rgba(255,79,60,.98); box-shadow: 0 0 14px rgba(255,79,60,.75) inset, 0 0 10px rgba(255,79,60,.6);
      animation: tele 0.55s ease-in-out infinite;
    }
    @keyframes tele { 50% { border-color: rgba(255,79,60,.4); box-shadow: 0 0 5px rgba(255,79,60,.3) inset; } }
    /* 術のエフェクト：マップ全域をひと呼吸だけ色で点滅させる（4-11F③・エリア点滅） */
    #fx { position: absolute; inset: 0; pointer-events: none; opacity: 0; z-index: 6; }
    #fx.warp { animation: fxflash .42s ease-out; background: radial-gradient(circle at var(--fxx,50%) var(--fxy,50%), rgba(200,90,255,.55), rgba(150,40,220,.18) 45%, transparent 72%); }
    #fx.still { animation: fxflash .55s ease-out; background: radial-gradient(circle at 50% 45%, rgba(120,210,255,.5), rgba(80,150,230,.16) 50%, transparent 75%); }
    #fx.blink { animation: fxflash .4s ease-out; background: radial-gradient(circle at var(--fxx,50%) var(--fxy,50%), rgba(150,120,255,.5), rgba(90,70,200,.15) 45%, transparent 70%); }
    @keyframes fxflash { 0% { opacity: 0; } 18% { opacity: 1; } 100% { opacity: 0; } }
    #light {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(circle at var(--px, 50%) var(--py, 50%),
        rgba(255,190,110,.15), rgba(255,190,110,.05) 30%, rgba(0,0,0,.5) 78%);
    }


    /* ---- ログ ---- */
    #log {
      flex: none; padding: 8px 14px; font-size: 13px; line-height: 1.7; height: 92px; overflow-y: auto;
      border-top: 1px solid #1c222b; background: #10141a;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif; color: #d6cfc0;
    }
    #log .dim { color: #6b7480; font-size: 12px; }
    #log .warn { color: #d98c7a; }

    /* ---- シート（場面・選択） ---- */
    #overlay {
      position: fixed; inset: 0; display: none; align-items: flex-end; z-index: 20;
      background: rgba(5,6,8,.62); backdrop-filter: blur(1.5px);
    }
    #overlay.show { display: flex; }
    #sheet {
      width: 100%; max-height: 86dvh; overflow-y: auto;
      background: #14181f; border-top: 1px solid #2c3440;
      padding: 16px 16px calc(14px + env(safe-area-inset-bottom));
      font-family: "Hiragino Mincho ProN", serif;
    }
    #sheetText { font-size: 14.5px; line-height: 1.95; color: #e8e2d4; white-space: pre-wrap; }
    #sheetMeta { font-size: 11px; color: #7d8794; margin-top: 8px; font-family: system-ui, sans-serif; }
    #sheetInputRow { display: none; margin-top: 12px; gap: 8px; }
    #sheetInputRow.show { display: flex; }
    #sheetInput {
      flex: 1; font-family: inherit; font-size: 16px; color: #e6ebf0;
      background: #1a1f27; border: 1px solid #2c3440; border-radius: 10px; padding: 11px 13px;
    }
    #sheetButtons { margin-top: 12px; }
    #sheetButtons button {
      display: block; width: 100%; text-align: left; font-family: inherit; font-size: 14.5px;
      color: #d8dee6; background: #1c232d; border: 1px solid #2e3946; border-radius: 10px;
      padding: 12px 14px; margin-top: 8px; line-height: 1.5;
    }
    #sheetButtons button:active { background: #28303d; }
  </style>
</head>
<body>
  <div id="status">
    <span id="stName">—</span>
    <span>深度 <b id="stDepth">0</b></span>
    <span id="stHp">HP --</span>
    <span id="stExp">深蝕 ░░░░░</span>
    <span class="spacer"></span>
    <button id="spellBtn" type="button">術</button>
    <button id="mapBtn" type="button">図</button>
    <button id="menuBtn" type="button">≡</button>
  </div>

  <div id="mapWrap">
    <div id="grid"></div>
    <div id="light"></div>
    <div id="fx"></div>
  </div>

  <div id="log"></div>

  <div id="overlay">
    <div id="sheet">
      <div id="sheetText"></div>
      <div id="sheetMeta"></div>
      <div id="sheetInputRow"><input id="sheetInput" type="text" autocomplete="off" /></div>
      <div id="sheetButtons"></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
    }
  </script>
</body>
</html>
