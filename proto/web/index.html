<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>堆積する世界 v0</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #0d0f12; color: #cfd6dd;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      display: flex; flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border-bottom: 1px solid #232830;
      font-size: 14px; letter-spacing: 0.2em; color: #8b94a0;
      flex: none;
    }
    header button {
      font-size: 12px; color: #6b7480; background: none;
      border: 1px solid #2a313b; border-radius: 6px; padding: 4px 10px;
    }
    #log {
      flex: 1; overflow-y: auto; padding: 14px 16px 8px;
      font-size: 15px; line-height: 1.85; -webkit-overflow-scrolling: touch;
      white-space: pre-wrap; word-break: break-word;
    }
    #log .sys { color: #8b94a0; font-size: 13px; }
    #log .scene { color: #e8e2d4; }
    #log .echo { color: #6f87a8; }
    #controls {
      flex: none; padding: 10px 12px 14px; border-top: 1px solid #232830;
      display: flex; flex-direction: column; gap: 8px; background: #11141a;
    }
    #prompt { font-size: 13px; color: #9aa4b0; padding: 0 4px; }
    .choice {
      display: block; width: 100%; text-align: left;
      font-family: inherit; font-size: 15px; color: #d8dee6;
      background: #1a1f27; border: 1px solid #2c3440; border-radius: 10px;
      padding: 12px 14px; line-height: 1.5;
    }
    .choice:active { background: #242b36; }
    #inputRow { display: flex; gap: 8px; }
    #inputRow input {
      flex: 1; font-family: inherit; font-size: 16px; color: #e6ebf0;
      background: #1a1f27; border: 1px solid #2c3440; border-radius: 10px;
      padding: 12px 14px;
    }
    #inputRow button {
      font-family: inherit; font-size: 15px; color: #d8dee6;
      background: #243042; border: 1px solid #34425a; border-radius: 10px; padding: 0 20px;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header>
    <span>堆積する世界 v0</span>
    <button id="newWorldBtn" type="button">新しい世界</button>
  </header>
  <div id="log"></div>
  <div id="controls">
    <div id="prompt"></div>
    <div id="choices"></div>
    <div id="inputRow" class="hidden">
      <input id="textInput" type="text" autocomplete="off" />
      <button id="textOk" type="button">決定</button>
    </div>
  </div>
  <script type="module" src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
    }
  </script>
</body>
</html>
