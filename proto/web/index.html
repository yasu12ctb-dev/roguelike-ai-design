<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <!-- iOS standalone はホームインジケータ帯（Webビュー外）を theme-color で塗る。
       タブバーと同色(#0c0f14)にして帯とバーを連続させ「最下端まで」見せる（2026-06-20）。 -->
  <meta name="theme-color" content="#0c0f14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>堆積する世界 v0</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    /* ゲーム中の誤操作防止：D-pad やマップのグリフを長押し／二度押ししても
       iOS の選択メニュー（コピー/調べる/翻訳）や文字選択が出ないようにする。入力欄だけ除外。 */
    html, body { -webkit-user-select: none; -moz-user-select: none; user-select: none; -webkit-touch-callout: none; }
    input, textarea { -webkit-user-select: text; user-select: text; -webkit-touch-callout: default; }
    html { height: 100%; overscroll-behavior: none; }
    /* iOS の全高問題（リサーチ確定・2026-06-20）：
       - 通常(Safari)は 100dvh が正（ツールバー伸縮に追従）。
       - standalone PWA はツールバーが無く overflow:hidden で非スクロール＝100vh が物理全画面で正。
         100dvh だと端末によりホームインジケータ分だけ短く解決され下端に隙間が出る。
       → 既定 100dvh、display-mode:standalone のときだけ 100vh に上書き。 */
    body {
      height: 100vh; height: 100dvh;
      overflow: hidden; overscroll-behavior: none;
      background: #0c0f14; color: #cfd6dd;
      font-family: "Hiragino Sans", system-ui, sans-serif;
      display: flex; flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
      touch-action: manipulation;
    }
    /* standalone PWA（ホーム画面起動）：100vh＝物理全画面で下端まで満たす（上記コメント参照） */
    @media (display-mode: standalone) { body { height: 100vh; } }

    /* ---- ステータスバー ---- */
    #status {
      flex: none; display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; font-size: 12.5px; color: #aab4c0;
      border-bottom: 1px solid #1c222b; background: #10141a;
    }
    #stHp { color: #e06c5a; }
    #stExp { color: #9d8fd8; }
    #stGold { color: #d9b34a; }
    #stBuff { color: #8fd0c0; font-size: .82em; flex: none; }
    #status .spacer { flex: 1; }
    #stVer { color: #5b6673; font-size: 10.5px; font-weight: 600; letter-spacing: .03em; flex: none; }
    #status > span { flex: none; }
    /* 長い名前は末尾…で省略＝レイアウト非破壊（フルネームはステータス画面） */
    #stName { color: #e8e2d4; max-width: 128px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 0 1 auto; }

    /* ---- マップ（方向A：発光グリフ） ---- */
    #mapWrap { position: relative; flex: 1; overflow: hidden; background: #07090c; touch-action: none; }
    #grid { display: grid; width: 100%; }
    .cell {
      position: relative; display: flex; align-items: center; justify-content: center;
      background: #07090c; overflow: hidden;
      font-family: "Menlo", "Consolas", monospace; font-weight: 700;
    }
    .cell.wall { background: #11151c; }
    .cell span { display: block; }
    /* グリフ色（発光） */
    .g-wall   { color: #39434f; }
    .g-floor  { color: #2c333d; }
    .g-down, .g-up { color: #6fb3c8; text-shadow: 0 0 9px rgba(111,179,200,.6); }
    .g-player { color: #ffd87a; text-shadow: 0 0 12px rgba(255,216,122,.9), 0 0 26px rgba(255,160,60,.45); }
    .g-player-danger { color: #ff4f3c; text-shadow: 0 0 14px rgba(255,79,60,1), 0 0 30px rgba(255,50,30,.7); animation: danger .55s ease-in-out infinite; }
    /* 同行（相棒）：青系の @＝「もう一人の人間＝味方」。被攻撃予告中は危険色（4-14C）。 */
    .g-companion { color: #6fc7ff; text-shadow: 0 0 12px rgba(111,199,255,.9), 0 0 24px rgba(70,150,255,.45); }
    .g-companion-danger { color: #ff4f3c; text-shadow: 0 0 14px rgba(255,79,60,1), 0 0 30px rgba(255,50,30,.7); animation: danger .55s ease-in-out infinite; }
    /* 連帯深蝕で奇癖が出た相棒：菫色の侵蝕味＋淡い明滅（4-14C Phase B）。.g-companion の後に置き上書き。 */
    .g-companion-erratic { color: #b58bff; text-shadow: 0 0 11px rgba(181,139,255,.9), 0 0 24px rgba(140,80,230,.5); animation: pulse 1.1s ease-in-out infinite; }
    /* 手負いの冒険者（救助＝相棒化／見捨て＝後世の宿敵）：弱く明滅する琥珀の & */
    .g-downed { color: #d8a24a; text-shadow: 0 0 8px rgba(216,162,74,.6); animation: pulse 1.8s ease-in-out infinite; }
    /* 召喚＝一時味方（術・援/移）：菫色の淡い明滅。数手で霧散する */
    .g-summon { color: #c79bff; text-shadow: 0 0 9px rgba(199,155,255,.85), 0 0 20px rgba(150,90,255,.4); animation: pulse 1.4s ease-in-out infinite; }
    @keyframes danger { 50% { color: #fff1e0; text-shadow: 0 0 18px rgba(255,120,90,1), 0 0 36px rgba(255,60,40,.85); } }
    /* 移動予告：敵が踏み込む先のマスを背景でハイライト（琥珀。攻撃予告の赤へ自然に段階づく） */
    .cell.tele-move { background: rgba(224,140,72,.34); box-shadow: 0 0 7px rgba(224,140,72,.3) inset; }
    /* 敵：記号＝種類／色＝強さの段（tier）。一目で危険度が分かる（4-11F）。 */
    .g-mon-t1 { color: #c4ccd4; text-shadow: 0 0 6px rgba(196,204,212,.5); }   /* 灰白：雑魚 */
    .g-mon-t2 { color: #e0c46a; text-shadow: 0 0 7px rgba(224,196,106,.55); }  /* 黄 */
    .g-mon-t3 { color: #e58a45; text-shadow: 0 0 9px rgba(229,138,69,.65); }   /* 橙 */
    .g-mon-t4 { color: #e0564a; text-shadow: 0 0 10px rgba(224,86,74,.75); }   /* 赤 */
    .g-mon-t5 { color: #c071ff; text-shadow: 0 0 13px rgba(192,113,255,.9); animation: pulse 2s ease-in-out infinite; } /* 紫発光：最危険 */
    /* ボス：中ボス＝金の輝き／エリアボス＝紫紅の脈動（別格） */
    .g-elite { color: #ffcf4a; text-shadow: 0 0 10px #ffcf4a, 0 0 20px rgba(255,170,40,.6); animation: pulse 1.4s ease-in-out infinite; }
    .g-boss  { color: #ff5cf0; text-shadow: 0 0 14px #ff5cf0, 0 0 30px rgba(255,60,200,.6); animation: pulse 1.05s ease-in-out infinite; }
    /* 攻撃を予告中：色はtierのまま、強く明滅して「来る」と知らせる */
    .g-mon-atk { animation: monatk .5s ease-in-out infinite; }
    @keyframes monatk { 0%,100% { text-shadow: 0 0 6px currentColor; } 50% { text-shadow: 0 0 16px currentColor, 0 0 26px currentColor; filter: brightness(1.5); } }
    .g-fossil { color: #9fd8cf; text-shadow: 0 0 10px rgba(159,216,207,.75); animation: pulse 2.6s ease-in-out infinite; }
    .g-fossil-quiet { color: #6f9a93; }
    .g-chest { color: #e8c06a; text-shadow: 0 0 9px rgba(232,192,106,.7); }
    .g-chest-open { color: #7a6a44; }
    /* 回復ノード（v2）：回復の泉＝青緑／安息所＝緑。帰還の扉＝金の脈動（往復チェックポイント）。 */
    .g-spring { color: #5fd2d8; text-shadow: 0 0 10px rgba(95,210,216,.8), 0 0 20px rgba(60,170,200,.4); animation: pulse 2.4s ease-in-out infinite; }
    .g-rest   { color: #8fdf9a; text-shadow: 0 0 10px rgba(143,223,154,.75); animation: pulse 2.8s ease-in-out infinite; }
    .g-door   { color: #ffd24a; text-shadow: 0 0 12px rgba(255,210,74,.9), 0 0 26px rgba(255,170,40,.5); animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 50% { text-shadow: 0 0 16px rgba(159,216,207,1), 0 0 30px rgba(159,216,207,.4); } }
    /* 攻撃予告：自分のマスが討たれる＝赤い危険枠（@ も赤く明滅する：g-player-danger） */
    .cell.tele-atk::after {
      content: ""; position: absolute; inset: 0; border-radius: 3px; pointer-events: none;
      border: 2.5px solid rgba(255,79,60,.98); box-shadow: 0 0 14px rgba(255,79,60,.75) inset, 0 0 10px rgba(255,79,60,.6);
      animation: tele 0.55s ease-in-out infinite;
    }
    @keyframes tele { 50% { border-color: rgba(255,79,60,.4); box-shadow: 0 0 5px rgba(255,79,60,.3) inset; } }
    /* 術のエフェクト：マップ全域をひと呼吸だけ色で点滅させる（4-11F③・エリア点滅） */
    #fx { position: absolute; inset: 0; pointer-events: none; opacity: 0; z-index: 6; }
    #fx.warp { animation: fxflash .42s ease-out; background: radial-gradient(circle at var(--fxx,50%) var(--fxy,50%), rgba(200,90,255,.55), rgba(150,40,220,.18) 45%, transparent 72%); }
    #fx.still { animation: fxflash .55s ease-out; background: radial-gradient(circle at 50% 45%, rgba(120,210,255,.5), rgba(80,150,230,.16) 50%, transparent 75%); }
    #fx.blink { animation: fxflash .4s ease-out; background: radial-gradient(circle at var(--fxx,50%) var(--fxy,50%), rgba(150,120,255,.5), rgba(90,70,200,.15) 45%, transparent 70%); }
    @keyframes fxflash { 0% { opacity: 0; } 18% { opacity: 1; } 100% { opacity: 0; } }
    #light {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(circle at var(--px, 50%) var(--py, 50%),
        rgba(255,190,110,.15), rgba(255,190,110,.05) 30%, rgba(0,0,0,.5) 78%);
    }


    /* ---- ログ（文字サイズ＝設定で 小/中/大。既定＝中） ---- */
    #log {
      flex: none; padding: 9px 14px; font-size: 15px; line-height: 1.8; height: 122px; overflow-y: auto;
      border-top: 1px solid #1c222b; background: #10141a;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif; color: #d6cfc0;
    }
    #log.s-sm { font-size: 13px; height: 100px; line-height: 1.7; }
    #log.s-lg { font-size: 17px; height: 150px; line-height: 1.85; }
    #log .dim { color: #6b7480; font-size: .86em; }
    #log .warn { color: #d98c7a; }
    #log .cue  { color: #8fd0c0; }

    /* ---- 下部タブバー（SubsFolio型）：実ビューポート最下端に固定ピン留め。
       ※ flex 最終子に頼ると iOS の position:fixed 親で自由領域計算が狂い下端に届かない
         （2026-06-20 FB・画像解析で確認）。position:fixed; bottom:0 で確実に最下端へ。 */
    #tabbar {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 10;
      display: none; align-items: stretch;
      background: #0c0f14; border-top: 1px solid #1c222b;
      /* アイコンを下端に寄せる：セーフエリアから 12px 引いてインジケータ上に詰める（最低 8px は確保）。 */
      padding-bottom: max(8px, calc(env(safe-area-inset-bottom, 0px) - 12px));
    }
    /* タブバー表示中は本体下部にバー高ぶんの余白を確保（D-pad 等がバー裏に隠れない） */
    body.has-tabbar { padding-bottom: calc(48px + max(8px, calc(env(safe-area-inset-bottom, 0px) - 12px))); }
    #tabbar.show { display: flex; }
    #tabbar .tab {
      flex: 1 1 0; min-width: 0; height: 48px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: #9aa4b0;
    }
    #tabbar .tab svg { width: 27px; height: 27px; filter: drop-shadow(0 0 4px currentColor); opacity: .92; }
    #tabbar .tab:active { color: #e8e2d4; }
    #tabbar #spellBtn { color: #c4abe6; }
    #tabbar #mapBtn { color: #8fb7d8; }
    #tabbar .tab.dis { opacity: .28; pointer-events: none; }

    /* ---- 行動デッキ（歩ける場面で常駐）：D-pad のみ。タブバーの上に重なる帯 ---- */
    #deck {
      flex: none; display: none; background: #0c0f14;
      align-items: flex-end; padding: 8px 14px 8px;
    }
    #deck.show { display: flex; }
    #dpadWrap { flex: 1; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; }
    #deck.pos-left #dpadWrap { justify-content: flex-start; padding-right: 0; padding-left: 6px; }
    #deck.pos-center #dpadWrap { justify-content: center; padding-right: 0; }
    #deck.nopad { display: none; }
    /* D-pad（帯内・サイズ可変） */
    #dpad { display: none; grid-template-columns: repeat(3,46px); grid-template-rows: repeat(3,42px); gap: 6px; flex: none; }
    #dpad.show { display: grid; }
    #dpad.sz-lg { grid-template-columns: repeat(3,54px); grid-template-rows: repeat(3,48px); }
    #dpad.sz-md { grid-template-columns: repeat(3,46px); grid-template-rows: repeat(3,42px); }
    #dpad.sz-sm { grid-template-columns: repeat(3,38px); grid-template-rows: repeat(3,36px); }
    #dpad button {
      font-size: 18px; color: #cdd6e0; background: rgba(22,27,34,.95);
      border: 1px solid #2e3946; border-radius: 10px; line-height: 1;
      display: flex; align-items: center; justify-content: center; padding: 0;
    }
    #dpad button:active { background: rgba(44,52,66,.95); color: #fff; }
    #dpad button.center { color: #8b94a0; font-size: 13px; }

    /* ---- 選択グリッド（術/品・冒険ハブの2列ボタン） ---- */
    .selgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .selgrid.one { grid-template-columns: 1fr; }
    .selgrid button {
      display: block; width: 100%; text-align: left; background: #1c232d; border: 1px solid #2e3946; border-radius: 12px;
      padding: 11px 12px 12px; min-height: 62px; font-family: inherit; color: #d8dee6;
    }
    .selgrid button:active { background: #28303d; }
    .selgrid .chip { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 7px; margin-bottom: 5px; border: 1px solid currentColor; }
    .selgrid .nm { font-size: 14.5px; color: #e8e2d4; font-weight: 700; line-height: 1.2; }
    .selgrid .sub { font-size: 11.5px; color: #9aa4b0; margin-top: 4px; line-height: 1.4; }
    .selgrid .cost { color: #b79be0; }
    .c-atk{color:#e0756a;} .c-ctl{color:#6fa8d8;} .c-mov{color:#6fc7c0;} .c-sup{color:#7fcf97;} .c-lore{color:#c4abe6;} .c-sum{color:#e0c46a;}
    /* ⌃メニューのアイコンセル（中央寄せ・アイコン＋ラベル） */
    .selgrid .mc { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 6px 0; }
    .selgrid .mc .icn { width: 28px; height: 28px; display: inline-block; color: #cdd6e0; }
    .selgrid .mc .icn svg { width: 28px; height: 28px; filter: drop-shadow(0 0 5px currentColor); opacity: .92; }
    .selgrid .mc .nm { text-align: center; }

    /* ---- シート（場面・選択） ---- */
    #overlay {
      position: fixed; inset: 0; display: none; align-items: flex-end; z-index: 20;
      background: rgba(5,6,8,.62); backdrop-filter: blur(1.5px);
    }
    #overlay.show { display: flex; }
    #sheet {
      width: 100%; max-height: 86dvh; overflow-y: auto;
      background: #14181f; border-top: 1px solid #2c3440;
      padding: 16px 16px calc(14px + env(safe-area-inset-bottom));
      font-family: "Hiragino Mincho ProN", serif;
    }
    #sheetText { font-size: 14.5px; line-height: 1.95; color: #e8e2d4; white-space: pre-wrap; }
    #sheetMeta { font-size: 11px; color: #7d8794; margin-top: 8px; font-family: system-ui, sans-serif; }
    #sheetInputRow { display: none; margin-top: 12px; gap: 8px; }
    #sheetInputRow.show { display: flex; }
    #sheetInput {
      flex: 1; font-family: inherit; font-size: 16px; color: #e6ebf0;
      background: #1a1f27; border: 1px solid #2c3440; border-radius: 10px; padding: 11px 13px;
    }
    #sheetButtons { margin-top: 12px; }
    #sheetButtons button {
      display: block; width: 100%; text-align: left; font-family: inherit; font-size: 14.5px;
      color: #d8dee6; background: #1c232d; border: 1px solid #2e3946; border-radius: 10px;
      padding: 12px 14px; margin-top: 8px; line-height: 1.5;
    }
    #sheetButtons button:active { background: #28303d; }
  </style>
</head>
<body>
  <div id="status">
    <span id="stName">—</span>
    <span>深度 <b id="stDepth">0</b></span>
    <span id="stHp">HP --</span>
    <span id="stExp">深蝕 ░░░░░</span>
    <span id="stGold">金 0</span>
    <span id="stBuff"></span>
    <span class="spacer"></span>
    <span id="stVer">v—</span>
  </div>

  <div id="mapWrap">
    <div id="grid"></div>
    <div id="light"></div>
    <div id="fx"></div>
  </div>

  <div id="log"></div>

  <!-- 行動デッキ：D-pad（移動補助・歩ける場面で常駐） -->
  <div id="deck">
    <div id="dpadWrap">
      <div id="dpad" aria-label="方向パッド">
        <button type="button" data-dx="-1" data-dy="-1" aria-label="左上">↖</button>
        <button type="button" data-dx="0"  data-dy="-1" aria-label="上">↑</button>
        <button type="button" data-dx="1"  data-dy="-1" aria-label="右上">↗</button>
        <button type="button" data-dx="-1" data-dy="0"  aria-label="左">←</button>
        <button type="button" class="center" data-dx="0" data-dy="0" aria-label="待機">待</button>
        <button type="button" data-dx="1"  data-dy="0"  aria-label="右">→</button>
        <button type="button" data-dx="-1" data-dy="1"  aria-label="左下">↙</button>
        <button type="button" data-dx="0"  data-dy="1"  aria-label="下">↓</button>
        <button type="button" data-dx="1"  data-dy="1"  aria-label="右下">↘</button>
      </div>
    </div>
  </div>

  <!-- 下部タブバー（最下部＝親指の届く位置・背景はセーフエリア最下端まで） -->
  <nav id="tabbar" aria-label="メニュー">
    <button id="spellBtn" class="tab" type="button" aria-label="術"></button>
    <button id="bagBtn"   class="tab" type="button" aria-label="品"></button>
    <button id="mapBtn"   class="tab" type="button" aria-label="地図"></button>
    <button id="statBtn"  class="tab" type="button" aria-label="ステータス"></button>
    <button id="cogBtn"   class="tab" type="button" aria-label="設定"></button>
  </nav>

  <div id="overlay">
    <div id="sheet">
      <div id="sheetText"></div>
      <div id="sheetMeta"></div>
      <div id="sheetInputRow"><input id="sheetInput" type="text" autocomplete="off" /></div>
      <div id="sheetButtons"></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
    }
  </script>
</body>
</html>
