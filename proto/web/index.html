<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <!-- iOS standalone はホームインジケータ帯（Webビュー外）を theme-color で塗る。
       タブバーと同色(--bg-panel #14110c)にして帯とバーを連続させ「最下端まで」見せる（2026-06-20／横断F ①静謐な写本 2026-07-02）。 -->
  <meta name="theme-color" content="#14110c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="深蝕" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>深蝕 — The Corroding Deep</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <style>
    /* 色トークン（意味づけした単一情報源＝prototype-spec.md §10.2 と同期。Swift は同名 Color へ）。
       ★横断F 方向①「静謐な写本」（墨と朱・2026-07-02 ユーザー確定・PR #282/#283 のモックで選定）。
       ・surfaces/lines/text は暖かい墨紙系へ差替。アクセント＝朱(--acc)＋金泥(--gold-leaf)。角は立てる(2-3px)。
       ・盤面（下記 .g-* / --bg-void / --bg-wall）と状態色（--c-hp/--c-exp/--c-gold/--c-buff/--c-warn・敵tier・学派色）は
         正典＝全テーマ不変。発光(text-shadow)の rgba は役割色からの装飾派生ゆえ各 .g-* にインライン保持。
       ・様式（罫・角飾り・ボタン役割・ゲージ・kv 行）は §10.2b「様式（静謐な写本）」を参照。 */
    :root {
      color-scheme: dark;
      /* surfaces（① 墨紙） */
      --bg-app:#0e0c09; --bg-panel:#14110c; --bg-void:#07090c; --bg-wall:#11151c;
      --bg-sheet:#17130e; --bg-input:#201a12; --bg-btn:#1d1812; --bg-btn-active:#2a2318;
      /* lines（①） */
      --line:#372f23; --line-2:#4a3f2e; --line-3:#4a3f2e;
      /* text（①） */
      --tx:#d8d0c0; --tx-strong:#efe6d3; --tx-2:#ddd3c2; --tx-dim:#a1957f;
      --tx-meta:#857a66; --tx-faint:#6b6250; --tx-status:#b0a48c; --tx-log:#d8cfba; --tx-log-dim:#a99d85;
      /* accent（① 朱・金泥） */
      --acc:#c2452f; --acc-2:#d9573c; --gold-leaf:#c9a75a;
      /* 様式トークン（① 角は立てる／ゲージは薄い墨線） */
      --r-btn:3px; --r-card:3px; --r-chip:2px; --gauge-h:5px; --gauge-r:0px;
      /* status / state accents（正典＝不変） */
      --c-hp:#e06c5a; --c-exp:#9d8fd8; --c-gold:#d9b34a; --c-buff:#8fd0c0; --c-warn:#d98c7a;
      /* glyph roles（正典＝不変） */
      --g-player:#ffd87a; --g-danger:#ff4f3c; --g-companion:#6fc7ff; --g-companion-erratic:#b58bff;
      --g-delver:#79d39b; --g-downed:#d8a24a; --g-summon:#c79bff; --g-stairs:#6fb3c8;
      --g-wall:#39434f; --g-floor:#2c333d;
      /* enemy tiers（正典＝不変） */
      --g-mon-t1:#c4ccd4; --g-mon-t2:#e0c46a; --g-mon-t3:#e58a45; --g-mon-t4:#e0564a; --g-mon-t5:#c071ff;
      --g-elite:#ffcf4a; --g-boss:#ff5cf0;
      /* objects / nodes（正典＝不変） */
      --g-fossil:#9fd8cf; --g-fossil-quiet:#6f9a93; --g-chest:#e8c06a; --g-chest-open:#7a6a44;
      --g-spring:#5fd2d8; --g-rest:#8fdf9a; --g-door:#ffd24a; --g-aurel:#ffcf6e; --g-laila:#c9a3ff;
      /* spell schools（正典＝不変） */
      --c-atk:#e0756a; --c-ctl:#6fa8d8; --c-mov:#6fc7c0; --c-sup:#7fcf97; --c-lore:#c4abe6; --c-sum:#e0c46a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    /* ゲーム中の誤操作防止：D-pad やマップのグリフを長押し／二度押ししても
       iOS の選択メニュー（コピー/調べる/翻訳）や文字選択が出ないようにする。入力欄だけ除外。 */
    html, body { -webkit-user-select: none; -moz-user-select: none; user-select: none; -webkit-touch-callout: none; }
    input, textarea { -webkit-user-select: text; user-select: text; -webkit-touch-callout: default; }
    html { height: 100%; overscroll-behavior: none; }
    /* iOS の全高問題（リサーチ確定・2026-06-20）：
       - 通常(Safari)は 100dvh が正（ツールバー伸縮に追従）。
       - standalone PWA はツールバーが無く overflow:hidden で非スクロール＝100vh が物理全画面で正。
         100dvh だと端末によりホームインジケータ分だけ短く解決され下端に隙間が出る。
       → 既定 100dvh、display-mode:standalone のときだけ 100vh に上書き。 */
    body {
      height: 100vh; height: 100dvh;
      overflow: hidden; overscroll-behavior: none;
      background: var(--bg-app); color: var(--tx);
      font-family: "Hiragino Sans", system-ui, sans-serif;
      display: flex; flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
      touch-action: manipulation;
    }
    /* standalone PWA（ホーム画面起動）：100vh＝物理全画面で下端まで満たす（上記コメント参照） */
    @media (display-mode: standalone) { body { height: 100vh; } }

    /* ---- ステータスバー（HUD・横断F 段階1：深蝕/HP をゲージ化＝危険度が一目で読める） ---- */
    #status {
      flex: none; padding: 7px 10px 8px; font-size: 12px; color: var(--tx-status);
      border-bottom: 1px solid var(--line); background: var(--bg-panel);
    }
    #stTop { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
    /* 名前は主・末尾…で省略（レイアウト非破壊）。版数は右端に必ず残す（最新判定用）。 */
    #stName { color: var(--tx-strong); font-weight: 700; font-size: 13.5px; max-width: 116px; overflow: hidden; text-overflow: ellipsis; flex: 0 1 auto; }
    #stTop .lv, #stTop .dep { color: var(--tx-dim); flex: none; }
    #stTop .lv b, #stTop .dep b { color: var(--tx-strong); font-variant-numeric: tabular-nums; }
    #stTop .sp { flex: 1; }
    #stGold { color: var(--c-gold); flex: none; font-variant-numeric: tabular-nums; }
    #stVer { color: var(--tx-faint); font-size: 10px; font-weight: 600; letter-spacing: .03em; flex: none; }
    /* HP/深蝕の細ゲージ。色は既存トークン。fill 幅は updateStatus が設定。
       ①静謐な写本＝発光/グラデを捨てた静かな墨線（角0・薄い墨地）。 */
    #stBars { display: flex; gap: 10px; margin-top: 6px; }
    #stBars .gauge { flex: 1; min-width: 0; }
    #stBars .gauge .lab { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 3px; font-variant-numeric: tabular-nums; }
    #stBars .gauge .track { position: relative; height: var(--gauge-h); border-radius: var(--gauge-r); background: #0b0906; overflow: hidden; box-shadow: 0 0 0 1px var(--line) inset; }
    #stBars .gauge .fill { height: 100%; border-radius: inherit; transition: width .18s ease; }
    #stBars .hp .lab { color: var(--c-hp); }
    #stBars .hp .fill { background: var(--c-hp); }
    #stBars .ex .lab { color: var(--c-exp); }
    #stBars .ex .fill { background: var(--c-exp); }
    /* 牙の閾（深蝕1.5／満点3.0＝50%）の目盛＝「牙＝HPドレインが始まる前に読める」（横断F ①）。 */
    #stBars .ex .track::after { content: ""; position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: rgba(194,69,47,.6); }
    /* バフ＝ピルチップ（タップで説明＝buffSheet）。空なら非表示。 */
    #stBuff { color: var(--c-buff); font-size: 11px; margin-top: 5px; }
    #stBuff:empty { display: none; }
    #stBuff .bf { display: inline-block; border: 1px solid rgba(143,208,192,.4); border-radius: 2px; padding: 1px 7px; margin-right: 6px; }
    /* B：脅威の常時表示（安全=緑／危険=赤）／E：踏み込み構えピル（金） */
    #stBuff .bf.threat-safe { color: var(--c-sup); border-color: rgba(127,207,151,.5); font-weight: 700; }
    #stBuff .bf.threat-warn { color: var(--g-danger); border-color: rgba(255,79,60,.55); font-weight: 700; }
    #stBuff .bf.lunge { color: var(--gold-leaf); border-color: rgba(201,167,90,.6); font-weight: 700; }

    /* ---- マップ（方向A：発光グリフ） ---- */
    /* 松明の色調＝深度帯で変わる（v0.99.0・§10.3b）：--torch-rgb を band クラスで切替。減光カーブは不変。 */
    #mapWrap { position: relative; flex: 1; overflow: hidden; background: var(--bg-void); touch-action: none;
      --torch-rgb: 255,190,110; }
    #mapWrap.band-mid  { --torch-rgb: 224,200,150; }
    #mapWrap.band-deep { --torch-rgb: 168,182,204; }
    #mapWrap.band-abyss { --torch-rgb: 178,150,222; }
    /* 深淵帯の空気＝縁がゆっくり脈動する菫のヴィネット（見づらくならない極薄）。 */
    #mapWrap.band-abyss::after { content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 5;
      box-shadow: inset 0 0 60px rgba(150,100,220,.16); animation: abyssair 6s ease-in-out infinite; }
    @keyframes abyssair { 50% { box-shadow: inset 0 0 90px rgba(150,100,220,.26); } }
    /* 照準バー（①静謐な写本・v0.99.0 でテーマ移行） */
    #aimBar { position: absolute; left: 50%; top: 8px; transform: translateX(-50%); z-index: 15;
      display: flex; gap: 8px; align-items: center; padding: 6px 8px; border-radius: var(--r-card);
      background: rgba(20,17,12,.94); border: 1px solid var(--line-2); box-shadow: 0 2px 10px rgba(0,0,0,.5);
      font-size: 12px; color: var(--tx); max-width: 94%; }
    #aimBar[hidden] { display: none; }
    #aimBar button { font-size: 12px; padding: 5px 10px; border-radius: var(--r-btn); border: 1px solid var(--line-2);
      background: transparent; color: var(--tx-2); font-family: inherit; }
    #aimBar #aimGo { border-color: var(--acc); color: #f0d9c8; box-shadow: 0 0 8px rgba(194,69,47,.25); }
    #aimBar.unreach #aimGo { border-color: #7a3a2c; color: var(--c-warn); box-shadow: none; opacity: .6; }
    /* 投擲照準バー（v0.133.0）：aimBar と同じ体裁・投げるは琥珀で強調 */
    #throwBar { position: absolute; left: 50%; top: 8px; transform: translateX(-50%); z-index: 15;
      display: flex; gap: 8px; align-items: center; padding: 6px 8px; border-radius: var(--r-card);
      background: rgba(20,17,12,.94); border: 1px solid var(--line-2); box-shadow: 0 2px 10px rgba(0,0,0,.5);
      font-size: 12px; color: var(--tx); max-width: 94%; }
    #throwBar[hidden] { display: none; }
    #throwBar button { font-size: 12px; padding: 5px 10px; border-radius: var(--r-btn); border: 1px solid var(--line-2);
      background: transparent; color: var(--tx-2); font-family: inherit; }
    #throwBar #throwGo { border-color: var(--gold-leaf); color: #ffe9b0; box-shadow: 0 0 8px rgba(201,167,90,.3); }
    .g-aim { color: #f6efe0; font-weight: 700; text-shadow: 0 0 6px rgba(201,167,90,.9); }
    /* 地図の経路プレビュー（照準までの bfsPath＝金泥の点）。 */
    .g-aimpath { color: var(--gold-leaf); text-shadow: 0 0 5px rgba(201,167,90,.6); }
    /* 地図の凡例（地図モード中のみ・地図の外＝下の専用行。盤面を覆わない・v0.109.0） */
    #mapLegend { flex: none; text-align: center; padding: 5px 8px 6px; background: var(--bg-void);
      border-top: 1px solid var(--line); font-size: 10.5px; color: var(--tx-dim);
      white-space: nowrap; overflow-x: auto; font-family: "Menlo", "Consolas", monospace; }
    #mapLegend[hidden] { display: none; }
    /* 全体図トグル（地図モード中・右下。1画面に収まる全体図 ⇄ 読めるサイズのパン表示） */
    #mapOverviewBtn { position: absolute; right: 8px; bottom: 8px; z-index: 15;
      padding: 6px 12px; border-radius: var(--r-btn); border: 1px solid var(--line-2);
      background: rgba(20,17,12,.92); color: var(--tx-2); font-family: inherit; font-size: 12px;
      box-shadow: 0 2px 10px rgba(0,0,0,.5); }
    #mapOverviewBtn[hidden] { display: none; }
    #mapLegend .lg { margin-right: 8px; }
    #mapLegend .lg:last-child { margin-right: 0; }
    /* 調べる（タップ＝NetHack「;」の現代化・v0.99.0）：HUD直下の帯ポップ。手番非消費・入力非ブロック。 */
    #peek { position: absolute; left: 50%; top: 8px; transform: translateX(-50%); z-index: 14;
      max-width: 94%; padding: 8px 12px; border-radius: var(--r-card);
      background: rgba(20,17,12,.94); border: 1px solid var(--line-2); box-shadow: 0 2px 10px rgba(0,0,0,.5);
      pointer-events: none; animation: peekin .16s ease-out; }
    #peek[hidden] { display: none; }
    #peek .pk-name { font-size: 13.5px; font-weight: 700; color: var(--tx-strong);
      border-left: 3px solid var(--acc); padding-left: 8px;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif CJK JP", serif; }
    #peek .pk-sub { font-size: 11px; color: var(--tx-dim); margin-top: 3px; line-height: 1.55; white-space: pre-wrap;
      font-family: "Hiragino Sans", system-ui, sans-serif; }
    @keyframes peekin { 0% { opacity: 0; transform: translateX(-50%) translateY(-4px); } 100% { opacity: 1; transform: translateX(-50%); } }
    /* 深度バナー（フロア進入時に一瞬・§10.3b） */
    #floorBanner { position: absolute; left: 0; right: 0; top: 34%; z-index: 13; text-align: center;
      pointer-events: none; opacity: 0;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif CJK JP", serif;
      font-size: 19px; letter-spacing: .3em; color: var(--tx-strong);
      text-shadow: 0 0 14px rgba(0,0,0,.9), 0 0 6px rgba(0,0,0,.9); }
    #floorBanner.show { animation: bannerfade 1.5s ease-out; }
    #floorBanner.abyss { color: #cdb2ee; }
    @keyframes bannerfade { 0% { opacity: 0; } 18% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; } }
    /* FloatFx（盤上のダメージ数字ポップ・シレン6流・v0.99.0）：純表示・上限つき・自己掃除。 */
    #floats { position: absolute; inset: 0; pointer-events: none; z-index: 7; overflow: hidden; }
    #floats .fl { position: absolute; transform: translate(-50%, -50%); font-weight: 700; font-size: 15px;
      font-family: "Menlo", "Consolas", monospace; animation: floatup .7s ease-out forwards;
      text-shadow: 0 0 6px rgba(0,0,0,.9), 0 1px 2px rgba(0,0,0,.9); }
    @keyframes floatup { 0% { opacity: 0; margin-top: 2px; } 15% { opacity: 1; } 100% { opacity: 0; margin-top: -22px; } }
    .fl-dmg  { color: var(--gold-leaf); }
    .fl-hurt { color: var(--c-hp); font-size: 16px; }
    .fl-heal { color: var(--g-rest); }
    .fl-miss { color: var(--tx-faint); font-size: 12px; }
    .fl-kill { color: #fff; text-shadow: 0 0 10px rgba(201,167,90,.9), 0 0 20px rgba(201,167,90,.5); animation: floatup .55s ease-out forwards; }
    .fl-crit { color: #fff; font-size: 21px; text-shadow: 0 0 12px rgba(230,198,106,1), 0 0 26px rgba(230,198,106,.6), 0 1px 2px rgba(0,0,0,.9);
      animation: floatup .8s ease-out forwards, critpop .28s ease-out; } /* 見切り反撃の会心数字（特大金白・v0.115.0） */
    @keyframes critpop { 0% { letter-spacing: 4px; filter: brightness(2); } 100% { letter-spacing: 0; filter: brightness(1); } }
    /* タイル演出レイヤ（1マスぶんの純CSSエフェクト・グリフを覆わない・v0.115.0） */
    #floats .tfx { position: absolute; transform: translate(-50%, -50%); pointer-events: none; }
    .tfx-ready { border: 2px solid var(--gold-leaf); border-radius: 50%;
      box-shadow: 0 0 14px rgba(230,198,106,.8), inset 0 0 8px rgba(230,198,106,.4);
      animation: fxready .45s ease-out forwards; } /* 見切り成立＝@に金の波紋 */
    @keyframes fxready { 0% { opacity: .95; transform: translate(-50%,-50%) scale(.3); } 100% { opacity: 0; transform: translate(-50%,-50%) scale(2.1); } }
    .tfx-slash::before { content: ""; position: absolute; left: 50%; top: 50%; width: 160%; height: 3px; border-radius: 2px;
      background: linear-gradient(90deg, transparent, #fff 35%, var(--gold-leaf) 65%, transparent);
      box-shadow: 0 0 10px rgba(255,230,150,.95), 0 0 22px rgba(230,198,106,.6);
      transform: translate(-50%,-50%) rotate(-45deg); }
    .tfx-slash { animation: fxslash .3s ease-out forwards; } /* 会心＝金白の一閃（斬光） */
    @keyframes fxslash { 0% { opacity: 0; transform: translate(-50%,-50%) scale(.4) rotate(0deg); } 20% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%,-50%) scale(1.35) rotate(0deg); } }
    .tfx-press::before, .tfx-press::after { content: ""; position: absolute; top: 50%; width: 26%; height: 55%; transform: translateY(-50%); opacity: .9; }
    .tfx-press::before { left: -10%; border: 2px solid var(--c-mov); border-right: none; animation: fxpressL .26s ease-out forwards; }
    .tfx-press::after  { right: -10%; border: 2px solid var(--c-mov); border-left: none; animation: fxpressR .26s ease-out forwards; }
    .tfx-press { filter: drop-shadow(0 0 6px rgba(111,199,192,.7)); } /* 挟撃＝両側から閉じる楔（控えめ） */
    @keyframes fxpressL { 0% { transform: translate(-70%,-50%); opacity: 0; } 45% { opacity: .9; } 100% { transform: translate(30%,-50%); opacity: 0; } }
    @keyframes fxpressR { 0% { transform: translate(70%,-50%); opacity: 0; } 45% { opacity: .9; } 100% { transform: translate(-30%,-50%); opacity: 0; } }
    .shake-crit { animation: shakecrit .14s linear; } /* 会心のマイクロシェイク（±2px・140ms） */
    @keyframes shakecrit { 25% { transform: translate(2px,-1px); } 50% { transform: translate(-2px,1px); } 75% { transform: translate(1px,1px); } 100% { transform: translate(0,0); } }
    #grid { display: grid; width: 100%; }
    .cell {
      position: relative; display: flex; align-items: center; justify-content: center;
      background: var(--bg-void); overflow: hidden;
      font-family: "Menlo", "Consolas", monospace; font-weight: 700;
    }
    /* 壁＝彫られた石の立体（上に淡いハイライト・下に影。glyph ▒ は不変・§10.3）。 */
    .cell.wall { background: var(--bg-wall);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.045), inset 0 -2px 3px rgba(0,0,0,.4); }
    .cell span { display: block; }
    /* グリフ色（発光） */
    .g-wall   { color: var(--g-wall); }
    .g-floor  { color: var(--g-floor); }
    /* 床むら＝「·」の濃淡3段（座標決定論＝(x*7+y*13)%3・rng非使用）。石畳の風合い。 */
    .g-floor.v0 { opacity: .55; }
    .g-floor.v1 { opacity: .78; }
    .g-down, .g-up { color: var(--g-stairs); text-shadow: 0 0 9px rgba(111,179,200,.6); }
    .g-player { color: var(--g-player); text-shadow: 0 0 12px rgba(255,216,122,.9), 0 0 26px rgba(255,160,60,.45); }
    .g-player-danger { color: var(--g-danger); text-shadow: 0 0 14px rgba(255,79,60,1), 0 0 30px rgba(255,50,30,.7); animation: danger .55s ease-in-out infinite; }
    /* 同行（相棒）：青系の @＝「もう一人の人間＝味方」。被攻撃予告中は危険色（4-14C）。 */
    .g-companion { color: var(--g-companion); text-shadow: 0 0 12px rgba(111,199,255,.9), 0 0 24px rgba(70,150,255,.45); }
    .g-companion-danger { color: var(--g-danger); text-shadow: 0 0 14px rgba(255,79,60,1), 0 0 30px rgba(255,50,30,.7); animation: danger .55s ease-in-out infinite; }
    /* 連帯深蝕で奇癖が出た相棒：菫色の侵蝕味＋淡い明滅（4-14C Phase B）。.g-companion の後に置き上書き。 */
    .g-companion-erratic { color: var(--g-companion-erratic); text-shadow: 0 0 11px rgba(181,139,255,.9), 0 0 24px rgba(140,80,230,.5); animation: pulse 1.1s ease-in-out infinite; }
    /* 手負いの冒険者（救助＝相棒化／見捨て＝後世の宿敵）：弱く明滅する琥珀の & */
    .g-downed { color: var(--g-downed); text-shadow: 0 0 8px rgba(216,162,74,.6); animation: pulse 1.8s ease-in-out infinite; }
    /* 同時に潜る生者の冒険者（すれ違いの軽イベント）：穏やかな緑の @（@色＝金/相棒=青と区別） */
    .g-delver { color: var(--g-delver); text-shadow: 0 0 9px rgba(121,211,155,.75), 0 0 18px rgba(80,180,120,.4); animation: pulse 1.7s ease-in-out infinite; }
    /* 召喚＝一時味方（術・援/移）：菫色の淡い明滅。数手で霧散する */
    .g-summon { color: var(--g-summon); text-shadow: 0 0 9px rgba(199,155,255,.85), 0 0 20px rgba(150,90,255,.4); animation: pulse 1.4s ease-in-out infinite; }
    @keyframes danger { 50% { color: #fff1e0; text-shadow: 0 0 18px rgba(255,120,90,1), 0 0 36px rgba(255,60,40,.85); } }
    /* 移動予告：敵が踏み込む先のマスを背景でハイライト（琥珀。攻撃予告の赤へ自然に段階づく） */
    .cell.tele-move { background: rgba(224,140,72,.34); box-shadow: 0 0 7px rgba(224,140,72,.3) inset; }
    /* 敵：記号＝種類／色＝強さの段（tier）。一目で危険度が分かる（4-11F）。 */
    .g-mon-t1 { color: var(--g-mon-t1); text-shadow: 0 0 6px rgba(196,204,212,.5); }   /* 灰白：雑魚 */
    .g-mon-t2 { color: var(--g-mon-t2); text-shadow: 0 0 7px rgba(224,196,106,.55); }  /* 黄 */
    .g-mon-t3 { color: var(--g-mon-t3); text-shadow: 0 0 9px rgba(229,138,69,.65); }   /* 橙 */
    .g-mon-t4 { color: var(--g-mon-t4); text-shadow: 0 0 10px rgba(224,86,74,.75); }   /* 赤 */
    .g-mon-t5 { color: var(--g-mon-t5); text-shadow: 0 0 13px rgba(192,113,255,.9); animation: pulse 2s ease-in-out infinite; } /* 紫発光：最危険 */
    /* ボス：中ボス＝金の輝き／エリアボス＝紫紅の脈動（別格） */
    .g-elite { color: var(--g-elite); text-shadow: 0 0 10px var(--g-elite), 0 0 20px rgba(255,170,40,.6); animation: pulse 1.4s ease-in-out infinite; }
    .g-boss  { color: var(--g-boss); text-shadow: 0 0 14px var(--g-boss), 0 0 30px rgba(255,60,200,.6); animation: pulse 1.05s ease-in-out infinite; }
    /* 攻撃を予告中：色はtierのまま、強く明滅して「来る」と知らせる */
    .g-mon-atk { animation: monatk .5s ease-in-out infinite; }
    @keyframes monatk { 0%,100% { text-shadow: 0 0 6px currentColor; } 50% { text-shadow: 0 0 16px currentColor, 0 0 26px currentColor; filter: brightness(1.5); } }
    /* ボスの渾身の一撃（B・テレグラフ）：溜め中のボスは橙白で激しく脈動＝「退け／備えよ」の合図。被予告マスも橙の危険枠。 */
    .g-boss-heavy { color: #fff; text-shadow: 0 0 16px #ffb000, 0 0 34px rgba(255,120,0,.9); animation: bossheavy .42s ease-in-out infinite; }
    @keyframes bossheavy { 0%,100% { filter: brightness(1.2); } 50% { filter: brightness(2); text-shadow: 0 0 22px #ffcf4a, 0 0 46px rgba(255,90,0,.95); } }
    .g-player-heavy { color: #fff; text-shadow: 0 0 16px rgba(255,120,0,1), 0 0 34px rgba(255,60,0,.85); animation: danger .4s ease-in-out infinite; }
    .g-fossil { color: var(--g-fossil); text-shadow: 0 0 10px rgba(159,216,207,.75); animation: pulse 2.6s ease-in-out infinite; }
    .g-fossil-quiet { color: var(--g-fossil-quiet); }
    .g-chest { color: var(--g-chest); text-shadow: 0 0 9px rgba(232,192,106,.7); }
    .g-chest-open { color: var(--g-chest-open); }
    /* 回復ノード（v2）：回復の泉＝青緑／安息所＝緑。帰還の扉＝金の脈動（往復チェックポイント）。 */
    .g-spring { color: var(--g-spring); text-shadow: 0 0 10px rgba(95,210,216,.8), 0 0 20px rgba(60,170,200,.4); animation: pulse 2.4s ease-in-out infinite; }
    .g-rest   { color: var(--g-rest); text-shadow: 0 0 10px rgba(143,223,154,.75); animation: pulse 2.8s ease-in-out infinite; }
    .g-door   { color: var(--g-door); text-shadow: 0 0 12px rgba(255,210,74,.9), 0 0 26px rgba(255,170,40,.5); animation: pulse 1.5s ease-in-out infinite; }
    .g-aurel  { color: var(--g-aurel); text-shadow: 0 0 12px rgba(255,207,110,.9), 0 0 26px rgba(255,170,40,.45); animation: pulse 1.8s ease-in-out infinite; } /* 始祖の遺構「痕」（4-15） */
    .g-laila  { color: var(--g-laila); text-shadow: 0 0 12px rgba(201,163,255,.9), 0 0 26px rgba(160,110,255,.5); animation: pulse 2.2s ease-in-out infinite; } /* ライラ・境（4-15） */
    @keyframes pulse { 50% { text-shadow: 0 0 16px rgba(159,216,207,1), 0 0 30px rgba(159,216,207,.4); } }
    /* 攻撃予告：自分のマスが討たれる＝赤い危険枠（@ も赤く明滅する：g-player-danger） */
    .cell.tele-atk::after {
      content: ""; position: absolute; inset: 0; border-radius: 3px; pointer-events: none;
      border: 2.5px solid rgba(255,79,60,.98); box-shadow: 0 0 14px rgba(255,79,60,.75) inset, 0 0 10px rgba(255,79,60,.6);
      animation: tele 0.55s ease-in-out infinite;
    }
    @keyframes tele { 50% { border-color: rgba(255,79,60,.4); box-shadow: 0 0 5px rgba(255,79,60,.3) inset; } }
    /* D：ボスの形つき確定範囲＝橙で全マスを1手前に予告（範囲外へ退けば確定安全） */
    .cell.tele-boss::before {
      content: ""; position: absolute; inset: 6%; border-radius: 3px; pointer-events: none;
      background: rgba(255,140,40,.24); border: 1.5px solid rgba(255,150,50,.85);
      box-shadow: 0 0 10px rgba(255,130,30,.4) inset; animation: teleboss .5s ease-in-out infinite;
    }
    @keyframes teleboss { 50% { background: rgba(255,140,40,.10); border-color: rgba(255,150,50,.4); } }
    /* B：脅威の可視化＝@ を殴れる敵タイルに薄い赤の破線枠 */
    .cell.threat-src::after {
      content: ""; position: absolute; inset: 2px; border-radius: 4px; pointer-events: none;
      border: 1.5px dashed rgba(255,79,60,.6);
    }
    /* 地形ハザード（v0.128.0）：床の色で読ませる危険なマス（グリフは置かない・盤面を汚さない）。
       敵を叩き込むのが本命＝控えめだが一目で分かる背景色＋淡い明滅。崩れ床は軋み中(hz-cracked)を強調。 */
    .cell.hz-fire    { background: rgba(224,90,40,.30); box-shadow: inset 0 0 10px rgba(255,110,40,.45); animation: hzfire 1.3s ease-in-out infinite; }
    @keyframes hzfire { 50% { background: rgba(240,120,50,.42); box-shadow: inset 0 0 16px rgba(255,140,50,.6); } }
    .cell.hz-venom   { background: rgba(70,170,90,.26); box-shadow: inset 0 0 9px rgba(90,200,110,.4); animation: hzvenom 2.2s ease-in-out infinite; }
    @keyframes hzvenom { 50% { background: rgba(90,190,110,.36); } }
    .cell.hz-crumble { background: rgba(150,120,50,.24); box-shadow: inset 0 0 8px rgba(180,150,70,.35); }
    .cell.hz-crumble.hz-cracked { animation: hzcrack .5s ease-in-out infinite; }
    @keyframes hzcrack { 50% { background: rgba(220,170,70,.5); box-shadow: inset 0 0 16px rgba(255,190,80,.7); } }
    .cell.hz-miasma  { background: rgba(150,90,210,.24); box-shadow: inset 0 0 10px rgba(160,100,220,.4); animation: hzmiasma 2.6s ease-in-out infinite; }
    @keyframes hzmiasma { 50% { background: rgba(165,105,225,.34); } }
    .cell.hz-frost   { background: rgba(120,180,225,.26); box-shadow: inset 0 0 9px rgba(150,200,240,.4); animation: hzfrost 2.4s ease-in-out infinite; }
    @keyframes hzfrost { 50% { background: rgba(150,205,240,.36); } }
    /* 投擲照準（v0.133.0）：着弾3×3の予告（throw-blast＝淡い琥珀枠）＋クロスヘア中心（throw-aim＝強い琥珀の照準） */
    .cell.throw-blast::after {
      content: ""; position: absolute; inset: 8%; border-radius: 3px; pointer-events: none;
      background: rgba(201,167,90,.14); border: 1px solid rgba(201,167,90,.5); box-shadow: 0 0 6px rgba(201,167,90,.2) inset;
    }
    .cell.throw-aim::after {
      content: "⊕"; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      pointer-events: none; color: #ffe9b0; font-weight: 700; text-shadow: 0 0 7px rgba(201,167,90,.95);
      background: rgba(201,167,90,.22); border: 1.5px solid rgba(201,167,90,.9); border-radius: 3px;
      animation: throwaim .7s ease-in-out infinite;
    }
    @keyframes throwaim { 50% { background: rgba(201,167,90,.10); border-color: rgba(201,167,90,.5); } }
    /* 術のエフェクト：マップ全域をひと呼吸だけ色で点滅させる（4-11F③・エリア点滅） */
    #fx { position: absolute; inset: 0; pointer-events: none; opacity: 0; z-index: 6; }
    #fx.warp { animation: fxflash .42s ease-out; background: radial-gradient(circle at var(--fxx,50%) var(--fxy,50%), rgba(200,90,255,.55), rgba(150,40,220,.18) 45%, transparent 72%); }
    #fx.still { animation: fxflash .55s ease-out; background: radial-gradient(circle at 50% 45%, rgba(120,210,255,.5), rgba(80,150,230,.16) 50%, transparent 75%); }
    #fx.blink { animation: fxflash .4s ease-out; background: radial-gradient(circle at var(--fxx,50%) var(--fxy,50%), rgba(150,120,255,.5), rgba(90,70,200,.15) 45%, transparent 70%); }
    @keyframes fxflash { 0% { opacity: 0; } 18% { opacity: 1; } 100% { opacity: 0; } }
    /* 松明＝色は帯（--torch-rgb）で変わり、炎らしくごく僅かに揺らぐ（torchflick）。減光カーブは従来どおり。 */
    #light {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(circle at var(--px, 50%) var(--py, 50%),
        rgba(var(--torch-rgb), .15), rgba(var(--torch-rgb), .05) 30%, rgba(0,0,0,.5) 78%);
      animation: torchflick 4.2s ease-in-out infinite;
    }
    @keyframes torchflick { 0%, 100% { opacity: 1; } 42% { opacity: .94; } 68% { opacity: .98; } }
    /* 街のヴィネット＝安全な街は暗くしない。中央がほんのり明るく縁が沈む、柔らかい暖光のみ（§10.4）。 */
    #light.town {
      background: radial-gradient(circle at var(--px, 50%) var(--py, 46%),
        rgba(255,205,140,.10), rgba(255,205,140,.03) 36%, rgba(0,0,0,.16) 82%);
      animation: none;
    }


    /* ---- ログ（文字サイズ＝設定で 小/中/大。既定＝中） ---- */
    #log {
      flex: none; padding: 9px 14px; font-size: 15px; line-height: 1.8; height: 122px; overflow-y: auto;
      border-top: 1px solid var(--line); background: var(--bg-panel);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif CJK JP", serif; color: var(--tx-log);
    }
    #log.s-sm { font-size: 13px; height: 100px; line-height: 1.7; }
    #log.s-lg { font-size: 17px; height: 150px; line-height: 1.85; }
    #log .dim { color: var(--tx-log-dim); font-size: .9em; }
    #log .warn { color: var(--c-warn); }
    #log .cue  { color: var(--c-buff); }

    /* ---- 下部タブバー（SubsFolio型）：実ビューポート最下端に固定ピン留め。
       ※ flex 最終子に頼ると iOS の position:fixed 親で自由領域計算が狂い下端に届かない
         （2026-06-20 FB・画像解析で確認）。position:fixed; bottom:0 で確実に最下端へ。 */
    #tabbar {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 10;
      display: none; align-items: stretch;
      /* ①静謐な写本＝子持罫（2px）＋パネル地で「帳の縁」の趣。 */
      background: var(--bg-panel); border-top: 2px solid var(--line);
      /* アイコンを下端に寄せる：セーフエリアから 12px 引いてインジケータ上に詰める（最低 8px は確保）。 */
      padding-bottom: max(8px, calc(env(safe-area-inset-bottom, 0px) - 12px));
    }
    /* タブバー表示中は本体下部にバー高ぶんの余白を確保（D-pad 等がバー裏に隠れない） */
    body.has-tabbar { padding-bottom: calc(48px + max(8px, calc(env(safe-area-inset-bottom, 0px) - 12px))); }
    #tabbar.show { display: flex; }
    #tabbar .tab {
      flex: 1 1 0; min-width: 0; height: 48px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: var(--tx-dim);
    }
    #tabbar .tab svg { width: 27px; height: 27px; filter: drop-shadow(0 0 4px currentColor); opacity: .92; }
    #tabbar .tab:active { color: var(--tx-strong); }
    #tabbar #spellBtn { color: #b9a8d8; }
    #tabbar #mapBtn { color: #8fb7d8; }
    #tabbar .tab.dis { opacity: .28; pointer-events: none; }

    /* ---- 行動デッキ（歩ける場面で常駐）：D-pad のみ。タブバーの上に重なる帯 ---- */
    #deck {
      flex: none; display: none; background: var(--bg-app);
      align-items: flex-end; padding: 8px 14px 8px;
    }
    #deck.show { display: flex; }
    #dpadWrap { flex: 1; display: flex; align-items: center; justify-content: flex-end; gap: 12px; padding-right: 6px; }
    #deck.pos-left #dpadWrap { justify-content: flex-start; padding-right: 0; padding-left: 6px; }
    #deck.pos-center #dpadWrap { justify-content: center; padding-right: 0; }
    #deck.nopad { display: none; }
    /* 踏み込みボタン（E）：D-pad の隣。armed=金点灯／stance=強い金発光＝構え固定。 */
    #lungeBtn {
      display: none; flex: none; width: 52px; min-height: 52px; align-self: center;
      font-family: inherit; font-size: 17px; font-weight: 700; letter-spacing: .12em; line-height: 1;
      color: #d8d0c0; background: rgba(29,24,18,.95); border: 1px solid var(--line-2); border-radius: 8px;
      user-select: none; -webkit-user-select: none; touch-action: manipulation;
    }
    #lungeBtn.show { display: flex; align-items: center; justify-content: center; }
    #lungeBtn.armed { color: var(--gold-leaf); border-color: var(--gold-leaf); background: #241c0e; box-shadow: 0 0 8px rgba(201,167,90,.35); }
    #lungeBtn.stance { color: #ffe9b0; border-color: var(--gold-leaf); background: #2e2410;
      box-shadow: 0 0 14px rgba(201,167,90,.75), inset 0 0 4px rgba(201,167,90,.9); animation: lungeGlow 1.1s ease-in-out infinite; }
    @keyframes lungeGlow { 50% { box-shadow: 0 0 20px rgba(230,198,106,.95), inset 0 0 6px rgba(230,198,106,1); } }
    /* 受け流しボタン（剣）：踏み込みボタンと同枠・青銀の守勢色。 */
    #guardBtn {
      display: none; flex: none; width: 52px; min-height: 52px; align-self: center;
      font-family: inherit; font-size: 17px; font-weight: 700; letter-spacing: .12em; line-height: 1;
      color: #bcd0e0; background: rgba(18,24,31,.95); border: 1px solid var(--line-2); border-radius: 8px;
      user-select: none; -webkit-user-select: none; touch-action: manipulation;
    }
    #guardBtn.show { display: flex; align-items: center; justify-content: center; }
    /* D-pad（帯内・サイズ可変） */
    #dpad { display: none; grid-template-columns: repeat(3,46px); grid-template-rows: repeat(3,42px); gap: 6px; flex: none; }
    #dpad.show { display: grid; }
    #dpad.sz-lg { grid-template-columns: repeat(3,54px); grid-template-rows: repeat(3,48px); }
    #dpad.sz-md { grid-template-columns: repeat(3,46px); grid-template-rows: repeat(3,42px); }
    #dpad.sz-sm { grid-template-columns: repeat(3,38px); grid-template-rows: repeat(3,36px); }
    #dpad button {
      font-size: 18px; color: #d8d0c0; background: rgba(29,24,18,.95);
      border: 1px solid var(--line-2); border-radius: 3px; line-height: 1;
      display: flex; align-items: center; justify-content: center; padding: 0;
    }
    #dpad button:active { background: rgba(42,35,24,.95); color: #efe6d3; }
    #dpad button.center { color: #a1957f; font-size: 13px; }

    /* ---- 選択グリッド（術/品・冒険ハブの2列ボタン） ---- */
    .selgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .selgrid.one { grid-template-columns: 1fr; }
    .selgrid button {
      display: block; width: 100%; text-align: left; background: transparent; border: 1px solid var(--line-2); border-radius: var(--r-card);
      padding: 11px 12px 12px; min-height: 62px; font-family: inherit; color: var(--tx-2);
    }
    .selgrid button:active { background: var(--bg-btn-active); }
    .selgrid .chip { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: var(--r-chip); margin-bottom: 5px; border: 1px solid currentColor; }
    /* 拾得物のシジル（★装備中／？未鑑定／〔…〕発動効果＝Wizardry/シレン流の1字圧縮・横断F ①）。 */
    .selgrid .nm .sig  { color: var(--gold-leaf); margin-right: 2px; }
    .selgrid .nm .sigq { color: var(--tx-dim); margin-right: 2px; }
    .selgrid .nm .mark { color: var(--acc-2); font-size: 12px; margin-left: 4px; }
    .selgrid .nm { font-size: 14.5px; color: var(--tx-strong); font-weight: 700; line-height: 1.2; }
    .selgrid .sub { font-size: 11.5px; color: var(--tx-dim); margin-top: 4px; line-height: 1.4; }
    .selgrid .cost { color: #b79be0; }
    .c-atk{color:var(--c-atk);} .c-ctl{color:var(--c-ctl);} .c-mov{color:var(--c-mov);} .c-sup{color:var(--c-sup);} .c-lore{color:var(--c-lore);} .c-sum{color:var(--c-sum);}
    /* ⌃メニューのアイコンセル（中央寄せ・アイコン＋ラベル） */
    .selgrid .mc { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 6px 0; }
    .selgrid .mc .icn { width: 28px; height: 28px; display: inline-block; color: #cdd6e0; }
    .selgrid .mc .icn svg { width: 28px; height: 28px; filter: drop-shadow(0 0 5px currentColor); opacity: .92; }
    .selgrid .mc .nm { text-align: center; }

    /* ---- シート（場面・選択）＝全対話の基本単位（横断F ①三層化：ヘッダ帯／本文・構造化行／ボタン列） ---- */
    #overlay {
      position: fixed; inset: 0; display: none; align-items: flex-end; z-index: 20;
      background: rgba(6,5,3,.62); backdrop-filter: blur(1.5px);
    }
    #overlay.show { display: flex; }
    #sheet {
      position: relative; width: 100%; max-height: 86dvh; overflow-y: auto;
      background: var(--bg-sheet); border-top: 3px double var(--line-2);
      padding: 16px 16px calc(14px + env(safe-area-inset-bottom));
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif CJK JP", serif;
    }
    /* 金泥のL字角飾り（写本の縁飾り）。Swift では小さな Path overlay でミラー。 */
    #sheet::before, #sheet::after { content: ""; position: absolute; top: 7px; width: 13px; height: 13px; pointer-events: none; z-index: 3; }
    #sheet::before { left: 7px; border-left: 1px solid rgba(201,167,90,.45); border-top: 1px solid rgba(201,167,90,.45); }
    #sheet::after { right: 7px; border-right: 1px solid rgba(201,167,90,.45); border-top: 1px solid rgba(201,167,90,.45); }
    /* ヘッダ帯（sticky）＝題（朱の左罫）＋副題＋✕。meta を持つシートでだけ表示（setSheetHead）。
       ✕をここへ統合＝スクロールしても手の届く位置（旧 float の代替）。Swift ＝ navigation title ＋ .topBarTrailing dismiss。 */
    #sheetHead {
      display: none; position: sticky; top: -16px; z-index: 2; margin: -16px -16px 12px;
      padding: 10px 16px 9px; background: var(--bg-sheet); border-bottom: 1px solid var(--line);
      align-items: center; gap: 10px;
    }
    #sheetHead.show { display: flex; }
    #sheetHeadTitle { flex: none; font-size: 15px; font-weight: 700; color: var(--tx-strong);
      border-left: 3px solid var(--acc); padding-left: 9px; letter-spacing: .04em; }
    #sheetHeadTitle:empty { display: none; }
    /* 副題＝空でも flex:1 の余白として残し、✕を右端へ押しやる。 */
    #sheetHeadSub { flex: 1; min-width: 0; text-align: right; font-size: 10.5px; color: var(--tx-meta);
      font-family: system-ui, sans-serif; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #sheetClose {
      display: none; flex: none; font-family: system-ui, sans-serif; font-size: 12px; color: var(--tx-2);
      background: transparent; border: 1px solid var(--line-2); border-radius: 3px; padding: 7px 12px; min-height: 34px;
    }
    #sheetClose.show { display: block; }
    #sheetClose:active { background: var(--bg-btn-active); }
    #sheetText { font-size: 14.5px; line-height: 1.95; color: var(--tx-strong); white-space: pre-wrap; }
    #sheetText:empty { display: none; }
    /* 構造化リスト（Wizardry 流の整列＝ラベル淡／値強・右寄せ tabular-nums・セクション朱罫）。
       Swift ＝ Section(header:) ＋ LabeledContent。sheet({sections}) が createElement で組む。 */
    #sheetList:empty { display: none; }
    #sheetList .sec-h { margin: 16px 0 2px; font-family: inherit; font-size: 12px; color: var(--tx-dim);
      border-left: 3px solid var(--acc); padding-left: 8px; letter-spacing: .08em; }
    #sheetList .kvrow { display: flex; justify-content: space-between; align-items: baseline; gap: 12px;
      padding: 7px 2px; border-top: 1px solid var(--line); font-size: 14px; line-height: 1.6; min-height: 34px; }
    #sheetList .kvrow.first { border-top: none; }
    #sheetList .kvlab { flex: none; font-size: 13px; color: var(--tx-dim); }
    #sheetList .kvval { color: var(--tx-strong); text-align: right; font-variant-numeric: tabular-nums; min-width: 0; }
    #sheetList .kvval .note { color: var(--tx-meta); font-size: 11px; margin-left: 6px; }
    #sheetList .kvtext { font-size: 13px; line-height: 1.8; padding: 6px 2px; color: var(--tx-strong); }
    #sheetList .kvtext.dim { color: var(--tx-dim); font-size: 12px; }
    #sheetList .kvtext.warn { color: var(--c-warn); }
    #sheetList .kvtext.lead { font-size: 15px; }
    #sheetList .exp { color: var(--c-exp); }
    #sheetInputRow { display: none; margin-top: 12px; gap: 8px; }
    #sheetInputRow.show { display: flex; }
    #sheetInput {
      flex: 1; font-family: inherit; font-size: 16px; color: var(--tx-strong);
      background: var(--bg-input); border: 1px solid var(--line-2); border-radius: 3px; padding: 11px 13px;
    }
    /* ボタン列＝塗りなし1px罫（写本）。役割クラス＝b-primary（朱罫＋微光）/b-cancel（罫なし中央）/b-danger（warn罫）。
       grp＝動詞グループ間の間隔。min-height 48px＝タッチ最小。 */
    #sheetButtons { margin-top: 12px; }
    #sheetButtons button {
      display: block; width: 100%; text-align: left; font-family: inherit; font-size: 14.5px;
      color: var(--tx-2); background: transparent; border: 1px solid var(--line-2); border-radius: var(--r-btn);
      padding: 12px 14px; margin-top: 8px; line-height: 1.5; min-height: 48px;
    }
    #sheetButtons button:active { background: var(--bg-btn-active); }
    #sheetButtons button.grp { margin-top: 14px; }
    #sheetButtons button.b-primary { border-color: var(--acc); color: #f0d9c8; box-shadow: 0 0 10px rgba(194,69,47,.22); }
    #sheetButtons button.b-cancel { border: none; background: none; text-align: center; color: var(--tx-dim); margin-top: 14px; }
    #sheetButtons button.b-danger { border-color: #7a3a2c; color: var(--c-warn); }
    /* 設定グループの見出し（sheet options の header で挿入）。 */
    #sheetButtons .sg { margin: 16px 0 2px; font-family: inherit; font-size: 12px; color: var(--tx-dim);
      border-left: 3px solid var(--acc); padding-left: 8px; letter-spacing: .08em; }
    #sheetButtons .sg:first-child { margin-top: 4px; }

    /* ---- タイトル画面（横断F ①静謐な写本＝墨黒・最小限の光・朱の落款） ---- */
    #title {
      position: fixed; inset: 0; z-index: 30; display: none; flex-direction: column; align-items: center;
      padding: 0 26px calc(24px + env(safe-area-inset-bottom)); background: var(--bg-app); overflow: hidden;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif CJK JP", serif;
    }
    #title.show { display: flex; }
    #title .vignette { position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(120% 80% at 50% 28%, rgba(255,240,210,.05), rgba(0,0,0,.55) 80%); }
    /* 残り火は①では出さない（DOM は残し CSS で隠す＝将来の別テーマで復帰可）。 */
    #title .embers { display: none; }
    #title .embers span { position: absolute; font-family: "Menlo", monospace; font-weight: 700; color: #ffcf7a; }
    #title .crest { margin-top: 16vh; text-align: center; z-index: 2; }
    #title .name { font-size: 50px; font-weight: 700; letter-spacing: .2em; line-height: 1.2;
      color: #efe6d3; text-shadow: 0 0 10px rgba(239,230,211,.14); }
    #title .entitle { margin-top: 12px; font-family: inherit; font-size: 15px; font-style: italic;
      letter-spacing: .12em; color: var(--tx-dim); z-index: 2; }
    #title .tagline { margin-top: 20px; font-size: 13px; line-height: 1.95; color: var(--tx-dim); letter-spacing: .04em; z-index: 2; text-align: center; }
    /* 朱の落款（写本の印）。 */
    #title .seal { display: flex; width: 30px; height: 30px; background: var(--acc); color: #f6e8dc;
      align-items: center; justify-content: center; font-size: 16px; font-weight: 700; border-radius: 2px;
      margin: 16px auto 0; box-shadow: 0 0 12px rgba(194,69,47,.35); z-index: 2; }
    #title .menu { margin-top: auto; width: 100%; max-width: 340px; z-index: 2; }
    #title .menu button { display: block; width: 100%; text-align: center; font-family: inherit;
      font-size: 15px; color: var(--tx-strong); background: transparent; border: 1px solid var(--line-2);
      border-radius: 3px; padding: 14px; margin-top: 9px; letter-spacing: .08em; min-height: 48px; }
    #title .menu button.primary { color: #f6e8dc; font-weight: 700;
      background: linear-gradient(180deg, #c2452f, #9c3423); border-color: #d9573c; box-shadow: 0 0 14px rgba(194,69,47,.3); }
    #title .sub { font-size: 11px; color: var(--tx-dim); text-align: center; margin-top: 8px; letter-spacing: .04em; min-height: 14px; z-index: 2; }
    #title .ver { margin-top: 13px; text-align: center; font-size: 10px; color: var(--tx-faint);
      font-family: system-ui, sans-serif; letter-spacing: .05em; z-index: 2; }
  </style>
</head>
<body>
  <div id="status">
    <div id="stTop">
      <span id="stName">—</span>
      <span class="lv">Lv<b id="stLv">1</b></span>
      <span class="dep">深度 <b id="stDepth">0</b></span>
      <span class="sp"></span>
      <span id="stGold">◇ 0</span>
      <span id="stVer">v—</span>
    </div>
    <div id="stBars">
      <div class="gauge hp"><div class="lab"><span>HP</span><span id="stHpVal">—</span></div><div class="track"><div id="stHpFill" class="fill"></div></div></div>
      <div class="gauge ex"><div class="lab"><span>深蝕</span><span id="stExVal">0%</span></div><div class="track"><div id="stExFill" class="fill"></div></div></div>
    </div>
    <div id="stBuff"></div>
  </div>

  <div id="mapWrap">
    <div id="grid"></div>
    <div id="light"></div>
    <div id="fx"></div>
    <!-- 盤上オーバーレイ（v0.99.0）：すべて #grid の兄弟＝グリッド再構築で消えない -->
    <div id="floats"></div>
    <div id="floorBanner"></div>
    <div id="peek" hidden><div class="pk-name"></div><div class="pk-sub"></div></div>
    <div id="aimBar" hidden>
      <span id="aimMsg">目標を方向パッドで調整</span>
      <button id="aimGo" type="button">移動</button>
      <button id="aimCancel" type="button">やめる</button>
    </div>
    <!-- 投擲照準バー（v0.133.0）：壺を離れたマスへ投げる（盤上クロスヘア） -->
    <div id="throwBar" hidden>
      <span id="throwMsg">投げる先を選ぶ</span>
      <button id="throwGo" type="button">投げる</button>
      <button id="throwCancel" type="button">やめる</button>
    </div>
    <button id="mapOverviewBtn" type="button" hidden>全体図</button>
  </div>

  <div id="mapLegend" hidden>
    <span class="lg"><span class="g-down">›</span>階段</span>
    <span class="lg"><span class="g-chest">▭</span>宝</span>
    <span class="lg"><span class="g-fossil">†</span>化石</span>
    <span class="lg"><span class="g-spring">泉</span></span>
    <span class="lg"><span class="g-rest">安</span></span>
    <span class="lg"><span class="g-door">扉</span></span>
    <span class="lg"><span class="g-aim">⊕</span>照準</span>
    <span class="lg" id="mapPanHint"></span>
  </div>

  <div id="log"></div>

  <!-- 行動デッキ：D-pad（移動補助・歩ける場面で常駐） -->
  <div id="deck">
    <div id="dpadWrap">
      <div id="dpad" aria-label="方向パッド">
        <button type="button" data-dx="-1" data-dy="-1" aria-label="左上">↖</button>
        <button type="button" data-dx="0"  data-dy="-1" aria-label="上">↑</button>
        <button type="button" data-dx="1"  data-dy="-1" aria-label="右上">↗</button>
        <button type="button" data-dx="-1" data-dy="0"  aria-label="左">←</button>
        <button type="button" class="center" data-dx="0" data-dy="0" aria-label="待機">待</button>
        <button type="button" data-dx="1"  data-dy="0"  aria-label="右">→</button>
        <button type="button" data-dx="-1" data-dy="1"  aria-label="左下">↙</button>
        <button type="button" data-dx="0"  data-dy="1"  aria-label="下">↓</button>
        <button type="button" data-dx="1"  data-dy="1"  aria-label="右下">↘</button>
      </div>
      <!-- 踏み込みボタン（E）：タップ=次の一撃だけ／長押し=構え固定。D-pad の隣＝親指で届く位置 -->
      <button id="lungeBtn" type="button" aria-label="踏み込み">踏</button>
      <!-- 受け流しボタン（剣）：タップ=一手消費で構え。次の隣接近接1撃を無効化＋反撃の好機 -->
      <button id="guardBtn" type="button" aria-label="受け流し">受</button>
    </div>
  </div>

  <!-- 下部タブバー（最下部＝親指の届く位置・背景はセーフエリア最下端まで） -->
  <nav id="tabbar" aria-label="メニュー">
    <button id="spellBtn" class="tab" type="button" aria-label="術"></button>
    <button id="bagBtn"   class="tab" type="button" aria-label="品"></button>
    <button id="mapBtn"   class="tab" type="button" aria-label="地図"></button>
    <button id="statBtn"  class="tab" type="button" aria-label="ステータス"></button>
    <button id="cogBtn"   class="tab" type="button" aria-label="設定"></button>
  </nav>

  <!-- タイトル画面（横断F 段階1）：起動でまず表示。メニューは titleScreen() が流し込む。 -->
  <div id="title">
    <div class="vignette"></div>
    <div class="embers">
      <span style="left:14%; top:18%; font-size:13px; opacity:.18;">＊</span>
      <span style="left:78%; top:24%; font-size:11px; opacity:.14;">·</span>
      <span style="left:30%; top:60%; font-size:12px; opacity:.12;">✦</span>
      <span style="left:66%; top:72%; font-size:10px; opacity:.12;">·</span>
      <span style="left:50%; top:86%; font-size:12px; opacity:.10;">＊</span>
    </div>
    <div class="crest"><div class="name">深蝕</div><div class="entitle">The Corroding Deep</div></div>
    <div class="tagline">あなたの死が、<br>世界の歴史になる。</div>
    <div class="seal" aria-hidden="true">蝕</div>
    <div class="menu" id="titleMenu"></div>
    <div class="sub" id="titleSub"></div>
    <div class="ver" id="titleVer"></div>
  </div>

  <div id="overlay">
    <div id="sheet">
      <div id="sheetHead">
        <div id="sheetHeadTitle"></div>
        <div id="sheetHeadSub"></div>
        <button id="sheetClose" type="button" aria-label="閉じる">✕ 閉じる</button>
      </div>
      <div id="sheetText"></div>
      <div id="sheetList"></div>
      <div id="sheetInputRow"><input id="sheetInput" type="text" autocomplete="off" /></div>
      <div id="sheetButtons"></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
  <script>
    // Service Worker 登録＋自動更新。新版を検知したら一度だけ自動リロードして最新へ差し替える。
    // ＝ホーム画面アイコンの入れ直し（＝localStorage のセーブ消失）をしなくても更新が届く。
    if ("serviceWorker" in navigator) {
      var hadController = !!navigator.serviceWorker.controller; // 既に旧SWが制御中か（初回インストールと区別）
      var swReloaded = false;
      navigator.serviceWorker.addEventListener("controllerchange", function () {
        if (!hadController || swReloaded) return; // 初回インストール時はリロードしない（更新時のみ）
        swReloaded = true;
        location.reload();
      });
      addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").then(function (reg) {
          reg.update().catch(function () {});
          // 待機中の新SWがあれば即時反映
          if (reg.waiting && navigator.serviceWorker.controller) reg.waiting.postMessage("skipWaiting");
          reg.addEventListener("updatefound", function () {
            var nw = reg.installing;
            if (!nw) return;
            nw.addEventListener("statechange", function () {
              if (nw.state === "installed" && navigator.serviceWorker.controller) {
                (reg.waiting || nw).postMessage("skipWaiting"); // 新版インストール完了＝反映を促す
              }
            });
          });
          // アプリ復帰（タブ再表示・PWA再前面）ごとに更新チェック＝開きっぱなしでも拾う
          document.addEventListener("visibilitychange", function () {
            if (!document.hidden) reg.update().catch(function () {});
          });
        }).catch(function () {});
      });
    }
  </script>
</body>
</html>
