<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0b0d10" />
<title>操作レイアウト 実機モック</title>
<style>
  :root{color-scheme:dark;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overscroll-behavior:none;}
  body{position:fixed;inset:0;height:100dvh;overflow:hidden;background:#0b0d10;color:#cfd6dd;font-family:"Hiragino Sans",system-ui,sans-serif;display:flex;flex-direction:column;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);touch-action:manipulation;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
  #status{flex:none;display:flex;align-items:center;gap:10px;padding:9px 14px;font-size:12.5px;color:#aab4c0;border-bottom:1px solid #1c222b;background:#10141a;}
  .stName{color:#e8e2d4;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:0 1 auto;} .stHp{color:#e06c5a;flex:none;} .stGold{color:#d9b34a;flex:none;} #status>span{flex:none;} #status .sp{flex:1;}
  .bar5 i{display:flex;gap:3px;} .bar5 i span{width:11px;height:9px;background:#2a3550;display:inline-block;} .bar5 i span.on{background:#9d8fd8;}
  #mapWrap{position:relative;flex:1;overflow:hidden;background:#07090c;touch-action:none;}
  #grid{display:grid;width:100%;height:100%;}
  .cell{display:flex;align-items:center;justify-content:center;font-family:"Menlo","Consolas",monospace;font-weight:700;font-size:18px;}
  .gw{color:#39434f;} .gf{color:#2c333d;} .gp{color:#ffd87a;text-shadow:0 0 12px rgba(255,216,122,.9),0 0 26px rgba(255,160,60,.45);}
  .m1{color:#c4ccd4;text-shadow:0 0 6px rgba(196,204,212,.5);} .m2{color:#e0c46a;text-shadow:0 0 7px rgba(224,196,106,.6);} .m4{color:#e0564a;text-shadow:0 0 10px rgba(224,86,74,.75);} .dn{color:#6fb3c8;text-shadow:0 0 9px rgba(111,179,200,.6);}
  #light{position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 50% 46%,rgba(255,190,110,.12),rgba(255,190,110,.04) 28%,rgba(0,0,0,.6) 78%);}
  #log{flex:none;padding:9px 14px;line-height:1.8;height:122px;overflow-y:auto;border-top:1px solid #1c222b;background:#10141a;font-family:"Hiragino Mincho ProN",serif;color:#d6cfc0;font-size:15px;}
  #log.s-sm{font-size:13px;height:100px;line-height:1.7;} #log.s-lg{font-size:17px;height:150px;line-height:1.85;}
  #log .warn{color:#d98c7a;} #log .dim{color:#6b7480;}
  #handle{flex:none;display:flex;align-items:center;justify-content:center;gap:8px;height:42px;background:#0c0f14;border-top:1px solid #1c222b;color:#aeb8c4;font-size:14px;}
  #handle .chev{font-size:16px;color:#cdd6e0;}
  /* 行動デッキ（dive 常駐）：術/品 を横並び、右(or左)=D-pad（オン時） */
  #deck{flex:none;display:none;background:#0c0f14;border-top:1px solid #1c222b;align-items:center;gap:12px;padding:12px 14px;}
  #deck.show{display:flex;}
  #deck.sz-lg{min-height:182px;} #deck.sz-md{min-height:158px;} #deck.sz-sm{min-height:138px;} #deck.nopad{min-height:96px;}
  #deck.pos-left{flex-direction:row-reverse;}
  #cluster{display:flex;gap:12px;flex:1;align-items:center;justify-content:center;}
  #cluster .qb{flex:none;width:62px;height:62px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:#1c232d;border:1px solid #2e3946;border-radius:14px;color:#cdd6e0;font-size:11px;font-weight:700;}
  #cluster .qb svg{width:23px;height:23px;filter:drop-shadow(0 0 4px currentColor);opacity:.92;}
  #cluster .qb.spell{color:#c4abe6;border-color:#3a2f50;} #cluster .qb:active{background:#28303d;}
  #dpad{display:grid;gap:6px;flex:none;}
  #dpad.sz-lg{grid-template-columns:repeat(3,54px);grid-template-rows:repeat(3,48px);}
  #dpad.sz-md{grid-template-columns:repeat(3,46px);grid-template-rows:repeat(3,42px);}
  #dpad.sz-sm{grid-template-columns:repeat(3,38px);grid-template-rows:repeat(3,36px);}
  #dpad b{font-weight:400;font-size:18px;color:#cdd6e0;background:rgba(22,27,34,.95);border:1px solid #2e3946;border-radius:10px;display:flex;align-items:center;justify-content:center;}
  #dpad b:active{background:#2c3543;} #dpad b.c{color:#8b94a0;font-size:13px;}
  #overlay{position:fixed;inset:0;display:none;align-items:flex-end;z-index:20;background:rgba(5,6,8,.62);}
  #overlay.show{display:flex;}
  #sheet{width:100%;max-height:86dvh;overflow-y:auto;background:#14181f;border-top:1px solid #2c3440;padding:16px 16px calc(16px + env(safe-area-inset-bottom));}
  #sheetTitle{font-size:11px;color:#7d8794;margin-bottom:10px;font-family:system-ui;}
  .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;}
  .pbtn{font-size:15px;color:#d8dee6;background:#1c232d;border:1px solid #2e3946;border-radius:12px;padding:16px 0 14px;text-align:center;font-weight:700;}
  .pbtn .ic{display:block;margin:0 auto 7px;width:30px;height:30px;} .pbtn .ic svg{width:30px;height:30px;filter:drop-shadow(0 0 5px currentColor);opacity:.92;}
  .pbtn:active{background:#28303d;}
  .opt{display:block;width:100%;text-align:left;font-size:14.5px;color:#d8dee6;background:#1c232d;border:1px solid #2e3946;border-radius:10px;padding:13px 14px;margin-top:8px;} .opt:active{background:#28303d;}
  /* 術/品 の選択（2列グリッド・大きめ・色分け） */
  .selgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:8px;}
  .selbtn{background:#1c232d;border:1px solid #2e3946;border-radius:12px;padding:11px 12px 12px;text-align:left;min-height:64px;display:flex;flex-direction:column;justify-content:center;}
  .selbtn:active{background:#28303d;}
  .selbtn .chip{align-self:flex-start;font-size:10px;font-weight:700;padding:1px 7px;border-radius:7px;margin-bottom:5px;border:1px solid currentColor;}
  .selbtn .nm{font-size:14.5px;color:#e8e2d4;font-weight:700;line-height:1.2;}
  .selbtn .sub{font-size:11.5px;color:#9aa4b0;margin-top:4px;}
  .selbtn .cost{color:#b79be0;}
  .selbtn.dis{opacity:.4;}
  .c-atk{color:#e0756a;} .c-ctl{color:#6fa8d8;} .c-mov{color:#6fc7c0;} .c-sup{color:#7fcf97;} .c-lore{color:#c4abe6;} .c-sum{color:#e0c46a;}
  .tip{position:fixed;left:50%;top:12px;transform:translateX(-50%);background:#1c232d;border:1px solid #2e3946;border-radius:10px;padding:7px 14px;font-size:12.5px;color:#aab4c0;z-index:30;opacity:0;transition:opacity .2s;} .tip.show{opacity:1;}
</style>
</head>
<body>
  <div id="status">
    <span class="stName">アルディス＝ヴェスパーリン</span><span>深度 <b style="color:#e8e2d4">2</b></span>
    <span class="stHp">HP 12/15</span>
    <span class="bar5"><span style="font-size:10px;color:#9d8fd8">深蝕</span><i><span class="on"></span><span class="on"></span><span></span><span></span><span></span></i></span>
    <span class="stGold">金 0</span><span class="sp"></span>
  </div>
  <div id="mapWrap"><div id="grid"></div><div id="light"></div></div>
  <div id="log"></div>
  <div id="handle"><span class="chev">⌃</span>メニュー</div>
  <div id="deck">
    <div id="cluster">
      <div class="qb spell" id="q-spell"></div>
      <div class="qb" id="q-bag"></div>
    </div>
    <div id="dpad" class="right sz-md"><b>↖</b><b>↑</b><b>↗</b><b>←</b><b class="c">待</b><b>→</b><b>↙</b><b>↓</b><b>↘</b></div>
  </div>
  <div id="overlay"><div id="sheet"><div id="sheetTitle"></div><div id="sheetBody"></div></div></div>
  <div class="tip" id="tip"></div>
<script>
const $=id=>document.getElementById(id);
let dpadOn=true, dpadPos='right', dpadSize='md', logSize='md';
const ICONS={
  spell:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 12c0-1.5 1.2-2.6 2.7-2.4 1.9.3 2.8 2.2 2.2 4-.8 2.4-3.4 3.4-5.7 2.4-2.9-1.2-4-4.6-2.6-7.3 1.7-3.3 5.9-4.5 9.3-2.5"/></svg>`,
  bag:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 8c0-2.2 1.5-3.8 3.5-3.8S15.5 5.8 15.5 8"/><path d="M6.6 8h10.8l1.1 7.6a3.8 3.8 0 0 1-3.8 4.3H9.3a3.8 3.8 0 0 1-3.8-4.3L6.6 8z"/><path d="M9.2 12.2h5.6"/></svg>`,
  stat:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.3"/><path d="M5.5 19.5c0-3.7 2.9-6.2 6.5-6.2s6.5 2.5 6.5 6.2"/></svg>`,
  map:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6.2l6-2 6 2 6-2v13.6l-6 2-6-2-6 2V6.2z"/><path d="M9 4.2v13.6M15 6.2v13.6"/></svg>`,
  hub:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6.2C9.8 4.9 7.2 4.6 4.5 5.2v13c2.7-.6 5.3-.3 7.5 1 2.2-1.3 4.8-1.6 7.5-1v-13C16.8 4.6 14.2 4.9 12 6.2z"/><path d="M12 6.2v13"/></svg>`,
  cog:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7h6M15 7h4M5 12h2M11 12h8M5 17h9M18 17h1"/><circle cx="13" cy="7" r="2"/><circle cx="9" cy="12" r="2"/><circle cx="16" cy="17" r="2"/></svg>`,
};
function qb(el, icon, label, spell){ $(el).className='qb'+(spell?' spell':''); $(el).innerHTML=`${icon}<span>${label}</span>`; }
qb('q-spell',ICONS.spell,'術',true); qb('q-bag',ICONS.bag,'品');
function drawDungeon(){
  const W=15, el=$('grid'); const rect=$('mapWrap').getBoundingClientRect();
  const rows=Math.max(8, Math.round(rect.height/(rect.width/W)));
  el.style.gridTemplateColumns=`repeat(${W},1fr)`; el.style.gridTemplateRows=`repeat(${rows},1fr)`;
  const px=7, py=Math.floor(rows/2);
  const mons=[{x:9,y:py-2,c:'m2',g:'k'},{x:5,y:py+3,c:'m1',g:'g'},{x:10,y:py+2,c:'m4',g:'B'}]; const down={x:11,y:py-4,g:'>',c:'dn'};
  let h='';
  for(let y=0;y<rows;y++)for(let x=0;x<W;x++){
    const d=Math.max(Math.abs(x-px),Math.abs(y-py)); let g='·',c='gf';
    if(x===0||y===0||x===W-1||y===rows-1){g='▒';c='gw';}
    const m=mons.find(m=>m.x===x&&m.y===y); if(m){g=m.g;c=m.c;}
    if(down.x===x&&down.y===y){g=down.g;c=down.c;}
    if(x===px&&y===py){g='@';c='gp';}
    const vis=d<=5; h+=`<div class="cell ${c}" style="opacity:${vis?(1-d*0.10):0.10}">${vis?g:''}</div>`;
  }
  el.innerHTML=h;
}
const LOG=[['鎧蟲が牙を剥いた。来る。','warn'],['鎧蟲に4の一撃。ひるんだ。',''],['深みの澱が肌を舐める……深蝕＋0.02。','dim'],['鎧蟲の一撃！ 2の傷。','warn'],['鎧蟲を討ち取った。',''],['床の隅に、古い化石の気配がある。','dim']];
function renderLog(){ $('log').className=logSize==='sm'?'s-sm':logSize==='lg'?'s-lg':''; $('log').innerHTML=LOG.map(([t,c])=>`<div class="${c}">${t}</div>`).join(''); $('log').scrollTop=$('log').scrollHeight; }
function pushLog(t,c=''){ LOG.push([t,c]); renderLog(); }
function tip(t){ const e=$('tip'); e.textContent=t; e.classList.add('show'); clearTimeout(e._t); e._t=setTimeout(()=>e.classList.remove('show'),1100); }
function closeSheet(){ $('overlay').classList.remove('show'); }
$('overlay').onclick=e=>{ if(e.target===$('overlay')) closeSheet(); };
function openSheet(title, html){ $('sheetTitle').textContent=title; $('sheetBody').innerHTML=html; $('overlay').classList.add('show'); }
function applyDpad(){
  const dk=$('deck'); dk.classList.add('show'); dk.classList.remove('sz-lg','sz-md','sz-sm','nopad','pos-left');
  if(dpadPos==='left') dk.classList.add('pos-left');
  if(dpadOn){ dk.classList.add('sz-'+dpadSize); $('dpad').style.display='grid'; $('dpad').className='sz-'+dpadSize; }
  else { dk.classList.add('nopad'); $('dpad').style.display='none'; }
  drawDungeon();
}
const SZ={lg:'大',md:'中',sm:'小'};
function menu(){
  openSheet('メニュー', `
    <div class="pgrid">
      <div class="pbtn" id="m-stat"><span class="ic">${ICONS.stat}</span>ステータス</div>
      <div class="pbtn" id="m-map"><span class="ic">${ICONS.map}</span>地図</div>
      <div class="pbtn" id="m-hub"><span class="ic">${ICONS.hub}</span>冒険の記録</div>
      <div class="pbtn" id="m-set"><span class="ic">${ICONS.cog}</span>設定</div>
    </div>
    <button class="opt" id="m-close" style="text-align:center">閉じる</button>`);
  $('m-stat').onclick=()=>stub('ステータス','《アルディス＝ヴェスパーリン》（第1世代）\nLv2 体3 力3 理2 心2 / 最大HP15 攻撃4 / 深蝕0.16\n装備：鉄の剣・革鎧 / 形質…（モック）\n※フルネームはここで確認できる。');
  $('m-map').onclick=()=>{ closeSheet(); tip('（モック）地図モード'); };
  $('m-hub').onclick=()=>stub('冒険の記録','進行中（依頼/因縁/印）／術の図鑑／装備／人物と年代記／敵図鑑（モック）');
  $('m-set').onclick=settings;
  $('m-close').onclick=closeSheet;
}
function settings(){
  openSheet('設定', `
    <button class="opt" id="o-mute">🔇 音を消す</button>
    <button class="opt" id="o-dpad">方向パッド：${dpadOn?'オン → オフ':'オフ → オン'}</button>
    <button class="opt" id="o-pos">方向パッドの位置：${dpadPos==='right'?'右下 → 左下':'左下 → 右下'}</button>
    <button class="opt" id="o-size">方向パッドの大きさ：${SZ[dpadSize]}（大→中→小）</button>
    <button class="opt" id="o-font">文字サイズ：${SZ[logSize]}（押して切替）</button>
    <button class="opt" id="o-reset">⟲ 世界を最初からやり直す</button>
    <button class="opt" id="o-back">戻る</button>`);
  $('o-mute').onclick=()=>tip('（モック）音 切替');
  $('o-dpad').onclick=()=>{ dpadOn=!dpadOn; applyDpad(); settings(); };
  $('o-pos').onclick=()=>{ dpadPos=dpadPos==='right'?'left':'right'; applyDpad(); settings(); };
  $('o-size').onclick=()=>{ dpadSize=dpadSize==='lg'?'md':dpadSize==='md'?'sm':'lg'; if(!dpadOn)dpadOn=true; applyDpad(); settings(); };
  $('o-font').onclick=()=>{ logSize=logSize==='sm'?'md':logSize==='md'?'lg':'sm'; renderLog(); settings(); };
  $('o-reset').onclick=()=>tip('（モック）リセット確認…');
  $('o-back').onclick=menu;
}
function stub(title, body){ openSheet(title, `<div style="font-size:14.5px;line-height:1.9;color:#e8e2d4;white-space:pre-wrap;margin-bottom:10px">${body}</div><button class="opt" id="s-back" style="text-align:center">戻る</button>`); $('s-back').onclick=menu; }
let ts=null;
$('mapWrap').addEventListener('touchstart',e=>{ts={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
$('mapWrap').addEventListener('touchend',e=>{ if(!ts)return; const dx=e.changedTouches[0].clientX-ts.x,dy=e.changedTouches[0].clientY-ts.y; ts=null;
  if(Math.hypot(dx,dy)<24){ pushLog('（その場で待機した）','dim'); return; }
  const ax=Math.abs(dx),ay=Math.abs(dy); const sx=ax>ay*0.41?Math.sign(dx):0,sy=ay>ax*0.41?Math.sign(dy):0;
  const nm={'0,-1':'上','0,1':'下','-1,0':'左','1,0':'右','-1,-1':'左上','1,-1':'右上','-1,1':'左下','1,1':'右下'}[`${sx},${sy}`]||''; pushLog(`${nm}へ歩いた。`,''); },{passive:true});
$('handle').onclick=menu;
const SPELLS=[
  {n:'歪撃',s:'攻',c:'c-atk',cost:'+0.15',d:'最寄りの可視敵を確定で討つ'},
  {n:'静止の眼',s:'制',c:'c-ctl',cost:'+0.20',d:'可視の敵を2手 止める'},
  {n:'影渡り',s:'移',c:'c-mov',cost:'+0.12',d:'最遠の床へ跳ぶ（逃走）'},
  {n:'硬鱗',s:'援',c:'c-sup',cost:'+0.10',d:'数手 防御を上げる'},
  {n:'腐喰',s:'攻',c:'c-atk',cost:'+0.18',d:'毒を与え 継続で削る'},
  {n:'看破',s:'識',c:'c-lore',cost:'+0.05',d:'周囲を見通す'},
];
const ITEMS=[
  {n:'癒しの実',q:2,d:'HPを回復する'},
  {n:'解毒の葉',q:1,d:'毒を癒す'},
  {n:'灯火の油',q:3,d:'視界を広げる'},
  {n:'力の丸薬',q:1,d:'数手 攻撃を上げる'},
];
function spellSelect(){
  const grid=SPELLS.map((s,i)=>`<div class="selbtn" data-i="${i}"><span class="chip ${s.c}">${s.s}</span><div class="nm">${s.n}</div><div class="sub">深蝕<span class="cost">${s.cost}</span>・${s.d}</div></div>`).join('');
  openSheet('術 ── 構え 6/10', `<div class="selgrid">${grid}</div><button class="opt" id="x" style="text-align:center">やめる</button>`);
  [...document.querySelectorAll('#sheetBody .selbtn')].forEach(el=>el.onclick=()=>{ closeSheet(); pushLog(`《${SPELLS[+el.dataset.i].n}》を放った。`,'warn'); });
  $('x').onclick=closeSheet;
}
function itemSelect(){
  const grid=ITEMS.map((it,i)=>`<div class="selbtn" data-i="${i}"><div class="nm">${it.n} <span style="color:#9aa4b0;font-weight:400">×${it.q}</span></div><div class="sub">${it.d}</div></div>`).join('');
  openSheet('品 ── 持ち物（使うと一手）', `<div class="selgrid">${grid}</div><button class="opt" id="x" style="text-align:center">やめる</button>`);
  [...document.querySelectorAll('#sheetBody .selbtn')].forEach(el=>el.onclick=()=>{ closeSheet(); pushLog(`${ITEMS[+el.dataset.i].n} を使った。`,''); });
  $('x').onclick=closeSheet;
}
$('q-spell').onclick=spellSelect;
$('q-bag').onclick=itemSelect;
[...$('dpad').querySelectorAll('b')].forEach(b=>b.onclick=()=>pushLog(`${b.textContent}方向へ。`,''));
addEventListener('resize',drawDungeon);
renderLog(); applyDpad();
</script>
</body>
</html>
