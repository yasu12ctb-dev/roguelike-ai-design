<!doctype html>
<html lang="ja"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>術アイコン候補</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;} body{background:#0b0d10;color:#cfd6dd;font-family:"Hiragino Sans",system-ui,sans-serif;padding:22px;}
  h1{font-size:16px;margin-bottom:14px;}
  .row{display:flex;gap:16px;flex-wrap:wrap;}
  .btn{width:104px;background:#1c232d;border:1px solid #3a2f50;border-radius:14px;padding:16px 0 12px;text-align:center;color:#c4abe6;font-weight:700;font-size:13px;}
  .btn .ic{display:block;margin:0 auto 8px;width:40px;height:40px;}
  .btn .ic svg{width:40px;height:40px;filter:drop-shadow(0 0 6px currentColor);}
  .lab{font-size:12px;color:#8b94a0;margin-top:6px;}
  .name{color:#e8e2d4;}
</style></head>
<body>
<h1>「術」アイコン候補（紫・発光）</h1>
<div class="row" id="row"></div>
<script>
const C={
  cur:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2.6"/><path d="M12 2.5v3.4M12 18.1v3.4M2.5 12h3.4M18.1 12h3.4M5.2 5.2l2.4 2.4M16.4 16.4l2.4 2.4M18.8 5.2l-2.4 2.4M7.6 16.4l-2.4 2.4"/></svg>`,
  eye:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 12s3.6-6.5 9.5-6.5S21.5 12 21.5 12 17.9 18.5 12 18.5 2.5 12 2.5 12z"/><circle cx="12" cy="12" r="2.7"/></svg>`,
  vortex:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 12c0-1.5 1.2-2.6 2.7-2.4 1.9.3 2.8 2.2 2.2 4-.8 2.4-3.4 3.4-5.7 2.4-2.9-1.2-4-4.6-2.6-7.3 1.7-3.3 5.9-4.5 9.3-2.5"/></svg>`,
  flame:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.5c2.6 3.2 5.2 5.2 5.2 9A5.2 5.2 0 0 1 6.8 11.5C6.8 9 9 7 12 2.5z"/><path d="M12 21.3a3.1 3.1 0 0 0 3.1-3.1c0-1.7-1.4-2.7-3.1-4.7-1.7 2-3.1 3-3.1 4.7a3.1 3.1 0 0 0 3.1 3.1z"/></svg>`,
  rune:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.2l9 9.8-9 9.8-9-9.8z"/><path d="M12 7v10M8 12h8"/></svg>`,
  crystal:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.2l5.2 5.2L12 21.8 6.8 7.4z"/><path d="M6.8 7.4h10.4M12 2.2v19.6"/></svg>`,
};
const items=[['現（火花）','cur'],['A 眼','eye'],['B 渦','vortex'],['C 炎','flame'],['D 印（菱）','rune'],['E 結晶','crystal']];
document.getElementById('row').innerHTML=items.map(([n,k])=>`<div class="btn"><span class="ic">${C[k]}</span><div class="name">術</div><div class="lab">${n}</div></div>`).join('');
</script>
</body></html>
