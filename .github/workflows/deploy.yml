# main へのマージごとに PWA をビルドして GitHub Pages へデプロイ
# 初回のみ: リポジトリ Settings → Pages → Source を「GitHub Actions」にすること

name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: proto/package-lock.json

      - name: Install dependencies
        working-directory: proto
        run: npm ci

      - name: Build PWA bundle
        working-directory: proto
        run: npm run build:web

      - name: Smoke test (deterministic demo must pass)
        working-directory: proto
        run: npm run demo

      - name: Companion contract/grade checks (4-14C/4-4E)
        working-directory: proto
        run: node --experimental-strip-types src/companion-check.ts

      - name: Content admission gate (4-9 鋳造所：storylets schema validation)
        working-directory: proto
        run: node tools/validate-content.mjs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: proto/web

      - id: deployment
        uses: actions/deploy-pages@v4
