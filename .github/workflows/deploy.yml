# main へのマージごとに PWA をビルドして GitHub Pages へデプロイ
# 初回のみ: リポジトリ Settings → Pages → Source を「GitHub Actions」にすること

name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: proto/package-lock.json

      - name: Install dependencies
        working-directory: proto
        run: npm ci

      # 受理ゲート一式（npm run check）＝ローカルと同一順：
      #   validate-content → demo → companion-check → item-check → echo-check
      #   → event-check → golden → build:web
      # check に新チェックを足せば CI も自動追従する（ドリフト防止）。
      - name: Acceptance gate (npm run check)
        working-directory: proto
        run: npm run check

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: proto/web

      - id: deployment
        uses: actions/deploy-pages@v4
